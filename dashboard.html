<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>SIJ - Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f4f4f4;
      display: flex;
    }

    /* SIDEBAR */
    .sidebar {
      width: 220px;
      height: 100vh;
      background: #7B1B38;
      color: white;
      padding: 20px;
    }

    .sidebar h2 {
      text-align: center;
      margin-bottom: 30px;
    }

    .menu-item {
      margin: 15px 0;
      cursor: pointer;
    }

    /* MAIN */
    .main {
      flex: 1;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    button {
      padding: 10px 20px;
      border: none;
      background: #7B1B38;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

  </style>
</head>
<body>

  <div class="sidebar">
    <h2>SIJ</h2>

    <div class="menu-item">📊 Dashboard</div>
    <div class="menu-item">📁 Processos</div>
    <div class="menu-item">👥 Clientes</div>
    <div class="menu-item">📅 Agenda</div>
    <div class="menu-item">📄 Documentos</div>
  </div>

  <div class="main">

    <div class="top">
      <h1>Dashboard</h1>
      <button onclick="logout()">Sair</button>
    </div>

    <div class="card">
      <h3>Bem-vindo ao SIJ</h3>
      <p>Sistema Jurídico Inteligente em construção 🚀</p>
    </div>

    <div class="card">
      <h3>Resumo</h3>
      <p>• Processos: 0</p>
      <p>• Clientes: 0</p>
      <p>• Tarefas: 0</p>
    </div>

  </div>

<script>
function logout() {
  window.location.href = "index.html";
}
</script>

</body>
</html>

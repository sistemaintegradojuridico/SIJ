<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>SIJ - Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container" id="container">

  <!-- CADASTRO -->
  <div class="form-container sign-up-container">
    <form id="formCadastro">
      <h2>Criar Conta</h2>
      <input type="text" id="nomeCadastro" placeholder="Nome" required />
      <input type="email" id="emailCadastro" placeholder="Email" required />
      <input type="password" id="senhaCadastro" placeholder="Senha" required />
      <button type="submit">Cadastrar</button>
    </form>
  </div>

  <!-- LOGIN -->
  <div class="form-container sign-in-container">
    <form id="formLogin">
      <h2>Entrar</h2>
      <input type="email" id="emailLogin" placeholder="Email" required />
      <input type="password" id="senhaLogin" placeholder="Senha" required />
      <button type="submit">Entrar</button>
    </form>
  </div>

  <!-- OVERLAY -->
  <div class="overlay-container">
    <div class="overlay">

      <div class="overlay-panel overlay-left">
        <h1>Bem-vindo!</h1>
        <p>Já tem conta?</p>
        <button class="ghost" id="signIn">Entrar</button>
      </div>

      <div class="overlay-panel overlay-right">
        <h1>SIJ</h1>
        <p>Sistema Inteligente Jurídico</p>
        <button class="ghost" id="signUp">Criar Conta</button>
      </div>

    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>

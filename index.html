<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>SIJ - Login</title>
  <link rel="stylesheet" href="SIJ/style.css">
</head>
<body>

<div class="sij-container" id="container">

  <!-- LOGIN -->
  <div class="form-box login-box">
    <h2>Acessar sistema</h2>

    <input type="email" placeholder="Seu email">
    <input type="password" placeholder="Sua senha">

    <button id="btnEntrar">Entrar</button>

    <p class="recuperar-senha" id="recuperarSenhaLogin">
      Recuperar senha
    </p>
  </div>

  <!-- CADASTRO -->
  <div class="form-box register-box">
    <h2>Criar conta</h2>

    <input type="text" placeholder="Nome completo">
    <input type="email" placeholder="Email">
    <input type="password" placeholder="Senha">

    <button id="btnCadastrar">Cadastrar</button>
  </div>

  <!-- PAINEL -->
  <div class="overlay">
    <div class="overlay-content">
      <h1>SIJ</h1>
      <p>Sistema Inteligente Jurídico</p>

      <button id="btnLogin">Já tenho conta</button>
      <button id="btnRegister">Criar conta</button>
    </div>
  </div>

</div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- SCRIPT -->
<script src="script.js"></script>

</body>
</html>

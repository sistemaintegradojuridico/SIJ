<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>SIJ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container" id="container">

  <!-- CADASTRO -->
  <div class="form-container sign-up-container">
    <form>
      <h1>Criar conta</h1>
      <input id="cadastroNome" type="text" placeholder="Nome completo" />
      <input id="cadastroEmail" type="email" placeholder="Email" />
      <input id="cadastroSenha" type="password" placeholder="Senha" />
      <button type="button" id="btnCadastrar">Cadastrar</button>
    </form>
  </div>

  <!-- LOGIN -->
  <div class="form-container sign-in-container">
    <form>
      <h1>Acessar sistema</h1>
      <input id="loginEmail" type="email" placeholder="Seu email" />
      <input id="loginSenha" type="password" placeholder="Sua senha" />

      <button type="button" id="btnEntrar">Entrar</button>

      <p id="recuperarSenhaLogin" class="recuperar">
        Recuperar senha
      </p>
    </form>
  </div>

  <!-- PAINEL -->
  <div class="overlay-container">
    <div class="overlay">

      <div class="overlay-panel overlay-left">
        <h1>Bem-vindo!</h1>
        <p>Já tem conta?</p>
        <button class="ghost" id="btnLogin">Entrar</button>
      </div>

      <div class="overlay-panel overlay-right">
        <h1>SIJ</h1>
        <p>Sistema Inteligente Jurídico</p>
        <button class="ghost" id="btnRegister">Criar conta</button>
      </div>

    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js"></script>

</body>
</html>

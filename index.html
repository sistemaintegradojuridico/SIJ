<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>SIJ - Login</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="container" id="container">

  <!-- CADASTRO -->
  <div class="form-container sign-up-container">
    <form>
      <h1>Criar conta</h1>
      <input type="text" placeholder="Nome" required />
      <input type="email" placeholder="Email" required />
      <input type="password" placeholder="Senha" required />
      <button type="button" id="btnCadastrar">Cadastrar</button>
    </form>
  </div>

  <!-- LOGIN -->
  <div class="form-container sign-in-container">
    <form>
      <h1>Acessar sistema</h1>
      <input type="email" placeholder="Email" required />
      <input type="password" placeholder="Senha" required />
      <button type="button" id="btnEntrar">Entrar</button>
      <a id="recuperarSenha">Recuperar senha</a>
    </form>
  </div>

  <!-- OVERLAY -->
  <div class="overlay-container">
    <div class="overlay">

      <div class="overlay-panel overlay-left">
        <h1>Bem-vindo!</h1>
        <p>Já tem conta?</p>
        <button class="ghost" id="signIn">Entrar</button>
      </div>

      <div class="overlay-panel overlay-right">
        <h1>SIJ</h1>
        <p>Sistema Inteligente Jurídico</p>
        <button class="ghost" id="signUp">Criar conta</button>
      </div>

    </div>
  </div>

</div>

<script src="./script.js"></script>

<!-- update -->
</body>
</html>

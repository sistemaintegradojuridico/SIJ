<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>SIJ - Sistema Jurídico</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f6f9;
    }

    .sidebar {
      width: 220px;
      height: 100vh;
      background: #1e293b;
      color: white;
      position: fixed;
      padding: 20px;
    }

    .sidebar h2 {
      margin-bottom: 30px;
    }

    .sidebar button {
      display: block;
      width: 100%;
      margin-bottom: 10px;
      padding: 10px;
      background: #334155;
      border: none;
      color: white;
      cursor: pointer;
    }

    .content {
      margin-left: 240px;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 8px;
    }

    input {
      padding: 8px;
      margin-right: 10px;
      margin-bottom: 10px;
    }

    button.acao {
      padding: 8px 12px;
      background: #2563eb;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="sidebar">
  <h2>SIJ</h2>
  <button onclick="mostrar('clientes')">Clientes</button>
  <button onclick="mostrar('processos')">Processos</button>
  <button onclick="mostrar('tarefas')">Tarefas</button>
</div>

<div class="content">

  <div id="clientes" class="card">
    <h2>Clientes</h2>
    <input id="nome" placeholder="Nome">
    <input id="email" placeholder="Email">
    <input id="telefone" placeholder="Telefone">
    <button class="acao" onclick="addCliente()">Criar Cliente</button>
  </div>

  <div id="processos" class="card" style="display:none;">
    <h2>Processos</h2>
    <p>(vamos ativar depois)</p>
  </div>

  <div id="tarefas" class="card" style="display:none;">
    <h2>Tarefas</h2>
    <p>(vamos ativar depois)</p>
  </div>

</div>

<script src="frontend/script.js"></script>

</body>
</html>

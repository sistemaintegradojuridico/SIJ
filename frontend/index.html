<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>SIJ PRO</title>

<style>
body{
  margin:0;
  font-family:Arial;
}

/* TEMAS */
.dark{
  background:#2b0d2b;
  color:white;
}

.light{
  background:#f4f6f9;
  color:black;
}

/* LOGIN */
#login{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#5a0f3b,#7b1e57,#3d0c2e);
}

.login-box{
  background:rgba(255,255,255,0.08);
  padding:30px;
  border-radius:15px;
  width:300px;
  text-align:center;
  color:white;
}

input, select{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:8px;
  border:none;
  box-sizing:border-box;
}

/* BOTÃO ROXO */
.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#4b006e;
  color:white;
  cursor:pointer;
}

/* APP */
#app{display:none;}

.sidebar{
  width:220px;
  height:100vh;
  background:#4b006e;
  color:white;
  padding:20px;
  position:fixed;
}

.sidebar button{
  width:100%;
  margin:8px 0;
  background:rgba(255,255,255,0.1);
  border:none;
  padding:10px;
  border-radius:8px;
  color:white;
  cursor:pointer;
}

.main{
  margin-left:220px;
  padding:20px;
}

/* FORM */
.form{
  max-width:400px;
}

/* CARD */
.card{
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
  position:relative;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

/* STATUS */
.status{
  padding:4px 10px;
  border-radius:20px;
  font-size:12px;
  color:white;
}

.ativo{background:#28a745;}
.vencer{background:#ffc107;color:black;}
.finalizado{background:#6c757d;}
.deferido{background:#007bff;}
.indeferido{background:#dc3545;}

/* BOTÕES CARD */
.actions{
  position:absolute;
  top:10px;
  right:10px;
}

.actions button{
  margin-left:5px;
  padding:5px 8px;
  font-size:12px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.edit{background:#4b006e;color:white;}
.delete{background:#dc3545;color:white;}

</style>
</head>

<body class="light">

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <h2>SIJ PRO</h2>

    <input id="email" placeholder="Email">
    <input id="senha" type="password" placeholder="Senha">

    <button class="btn" onclick="entrar()">Entrar</button>

    <div style="margin-top:10px;font-size:13px">
      <div onclick="alert('Cadastro em breve')" style="cursor:pointer">Criar conta</div>
      <div onclick="alert('Email enviado (simulado)')" style="cursor:pointer">Esqueci minha senha</div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">

<div class="sidebar">
  <h2>SIJ</h2>

  <button onclick="mostrar('lista')">Processos</button>
  <button onclick="mostrar('novo')">Novo</button>
  <button onclick="trocarTema()">🌗 Tema</button>
  <button onclick="sair()">Sair</button>
</div>

<div class="main">

<h2>Processos</h2>

<!-- FORM -->
<div id="novo" class="form" style="display:none;">
<input id="titulo" placeholder="Título">
<select id="area">
<option>Cível</option>
<option>Previdenciário</option>
<option>Família</option>
<option>Trabalhista</option>
</select>
<input id="parte" placeholder="Parte">
<input id="prazo" type="date">

<select id="status">
<option value="ativo">Ativo</option>
<option value="vencer">A vencer</option>
<option value="finalizado">Finalizado</option>
<option value="deferido">Deferido</option>
<option value="indeferido">Indeferido</option>
</select>

<button class="btn" onclick="salvar()">Salvar</button>
</div>

<!-- LISTA -->
<div id="lista"></div>

</div>
</div>

<script>

let editando=null

function entrar(){
  if(email.value && senha.value){
    login.style.display="none"
    app.style.display="block"
    listar()
  }
}

function sair(){
  app.style.display="none"
  login.style.display="flex"
}

function mostrar(t){
  novo.style.display="none"
  if(t==="novo") novo.style.display="block"
}

function salvar(){
  let dados = JSON.parse(localStorage.getItem("dados")||"[]")

  if(editando){
    let p = dados.find(x=>x.id===editando)
    p.titulo=titulo.value
    p.area=area.value
    p.parte=parte.value
    p.prazo=prazo.value
    p.status=status.value
  }else{
    dados.push({
      id:Date.now(),
      titulo:titulo.value,
      area:area.value,
      parte:parte.value,
      prazo:prazo.value,
      status:status.value,
      data:new Date().toLocaleDateString()
    })
  }

  localStorage.setItem("dados",JSON.stringify(dados))
  listar()
  novo.style.display="none"
}

function listar(){
  let dados = JSON.parse(localStorage.getItem("dados")||"[]")
  lista.innerHTML=""

  dados.forEach(p=>{
    lista.innerHTML+=`
    <div class="card">
      <div class="actions">
        <button class="edit" onclick="editar(${p.id})">Editar</button>
        <button class="delete" onclick="excluir(${p.id})">Excluir</button>
      </div>

      <span class="status ${p.status}">${p.status}</span><br><br>
      <b>${p.titulo}</b><br>
      ${p.area} - ${p.parte}<br>
      Prazo: ${p.prazo || "—"}<br>
      <small>Criado: ${p.data}</small>
    </div>`
  })
}

function editar(id){
  let dados = JSON.parse(localStorage.getItem("dados"))
  let p = dados.find(x=>x.id===id)

  titulo.value=p.titulo
  area.value=p.area
  parte.value=p.parte
  prazo.value=p.prazo
  status.value=p.status

  editando=id
  mostrar("novo")
}

function excluir(id){
  let dados = JSON.parse(localStorage.getItem("dados"))
  dados = dados.filter(p=>p.id!==id)
  localStorage.setItem("dados",JSON.stringify(dados))
  listar()
}

function trocarTema(){
  if(document.body.classList.contains("dark")){
    document.body.classList.remove("dark")
    document.body.classList.add("light")
  }else{
    document.body.classList.remove("light")
    document.body.classList.add("dark")
  }
}

</script>

</body>
</html>

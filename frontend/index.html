<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>SIJ</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;

  background: linear-gradient(135deg, #3b0a14, #6e0f1f);
  position: relative;
}

/* textura */
body::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background-image: url("https://www.transparenttextures.com/patterns/asfalt-light.png");
  opacity: 0.2;
}

.container {
  background: rgba(255,255,255,0.95);
  padding: 30px;
  border-radius: 15px;
  width: 320px;
  box-shadow: 0 0 30px rgba(0,0,0,0.3);
  position: relative;
  z-index: 1;
}

h2 {
  text-align: center;
}

.logo {
  text-align: center;
  font-size: 22px;
  margin-bottom: 10px;
}

input {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(135deg, #8b1e2d, #5c0d18);
  color: white;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

.link {
  text-align: center;
  margin-top: 10px;
  cursor: pointer;
  color: #8b1e2d;
}

.hidden {
  display: none;
}

.process {
  background: #eee;
  padding: 8px;
  margin-top: 5px;
  border-radius: 5px;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">⚖️ SIJ</div>

<!-- LOGIN -->
<div id="loginBox">
<h2>Login</h2>
<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>

<div class="link" onclick="mostrarCadastro()">Criar conta</div>
</div>

<!-- CADASTRO -->
<div id="cadastroBox" class="hidden">
<h2>Criar Conta</h2>
<input id="novoEmail" placeholder="Email">
<input id="novaSenha" type="password" placeholder="Senha">
<button onclick="register()">Cadastrar</button>

<div class="link" onclick="voltarLogin()">Voltar</div>
</div>

<!-- SISTEMA -->
<div id="sistemaBox" class="hidden">

<h2>Painel</h2>

<button onclick="logout()">Sair</button>

<h3>Criar Processo</h3>
<input id="titulo" placeholder="Título">
<input id="descricao" placeholder="Descrição">
<button onclick="criar()">Salvar</button>

<h3>Processos</h3>
<div id="lista"></div>

</div>

</div>

<script>
const API = "https://sij-backend.onrender.com"

let token = null

function mostrarCadastro(){
  loginBox.classList.add("hidden")
  cadastroBox.classList.remove("hidden")
}

function voltarLogin(){
  cadastroBox.classList.add("hidden")
  loginBox.classList.remove("hidden")
}

async function register(){
  const res = await fetch(API + "/register", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      email: document.getElementById("novoEmail").value,
      password: document.getElementById("novaSenha").value
    })
  })

  const data = await res.json()

  if(data.ok){
    alert("Conta criada!")
    voltarLogin()
  } else {
    alert(data.error)
  }
}

async function login(){
  const res = await fetch(API + "/login", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      email: document.getElementById("email").value,
      password: document.getElementById("senha").value
    })
  })

  const data = await res.json()

  if(data.token){
    token = data.token

    loginBox.classList.add("hidden")
    sistemaBox.classList.remove("hidden")

    listar()
  } else {
    alert("Erro no login")
  }
}

function logout(){
  token = null
  sistemaBox.classList.add("hidden")
  loginBox.classList.remove("hidden")
}

async function criar(){
  await fetch(API + "/processos", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization": token
    },
    body: JSON.stringify({
      titulo: titulo.value,
      descricao: descricao.value
    })
  })

  listar()
}

async function listar(){
  const res = await fetch(API + "/processos", {
    headers:{"Authorization": token}
  })

  const dados = await res.json()

  lista.innerHTML = ""

  dados.forEach(p => {
    lista.innerHTML += `
      <div class="process">
        ${p.titulo} - ${p.descricao}
        <button onclick="excluir(${p.id})">Excluir</button>
      </div>
    `
  })
}

async function excluir(id){
  await fetch(API + "/processos/" + id, {
    method:"DELETE",
    headers:{"Authorization": token}
  })

  listar()
}
</script>

</body>
</html>

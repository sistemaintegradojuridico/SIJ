<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>SIJ</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #0f172a, #6d28d9);
      color: white;
      text-align: center;
      padding: 20px;
    }

    .box {
      background: white;
      color: black;
      padding: 20px;
      border-radius: 10px;
      max-width: 400px;
      margin: auto;
    }

    input, button {
      width: 100%;
      margin: 5px 0;
      padding: 10px;
    }

    button {
      background: #6d28d9;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #5b21b6;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>

  <h1>⚖️ SIJ</h1>

  <div class="box">

    <!-- LOGIN -->
    <h3>Login</h3>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Senha">
    <button onclick="login()">Entrar</button>

    <hr>

    <!-- CADASTRO -->
    <h3>Cadastrar</h3>
    <button onclick="register()">Criar conta</button>

    <hr>

    <!-- PROCESSOS -->
    <div id="area" class="hidden">
      <h3>Criar Processo</h3>
      <input id="titulo" placeholder="Título">
      <input id="descricao" placeholder="Descrição">
      <button onclick="criar()">Salvar</button>

      <h3>Processos</h3>
      <ul id="lista"></ul>
    </div>

  </div>

<script>
const API = "https://sij-backend.onrender.com"

let token = null

// LOGIN
async function login(){
  const res = await fetch(API + "/login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      email: document.getElementById("email").value,
      password: document.getElementById("password").value
    })
  })

  const data = await res.json()

  if(data.token){
    token = data.token
    alert("Login feito!")
    document.getElementById("area").classList.remove("hidden")
    listar()
  } else {
    alert(data.error || "Erro no login")
  }
}

// CADASTRO
async function register(){
  const res = await fetch(API + "/register", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      email: document.getElementById("email").value,
      password: document.getElementById("password").value
    })
  })

  const data = await res.json()

  if(data.ok){
    alert("Conta criada!")
  } else {
    alert("Erro: " + data.error)
  }
}

// CRIAR PROCESSO
async function criar(){
  const res = await fetch(API + "/processos", {
    method: "POST",
    headers: {
      "Content-Type":"application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify({
      titulo: document.getElementById("titulo").value,
      descricao: document.getElementById("descricao").value
    })
  })

  const data = await res.json()

  if(data.ok){
    alert("Salvo!")
    listar()
  } else {
    alert("Erro")
  }
}

// LISTAR
async function listar(){
  const res = await fetch(API + "/processos", {
    headers: {
      "Authorization": "Bearer " + token
    }
  })

  const data = await res.json()

  const lista = document.getElementById("lista")
  lista.innerHTML = ""

  data.forEach(p => {
    const li = document.createElement("li")
    li.innerText = p.titulo + " - " + p.descricao
    lista.appendChild(li)
  })
}
</script>

</body>
</html>

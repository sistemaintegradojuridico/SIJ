<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>SIJ PRO</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f6f9;
}

/* DARK MODE */
.dark{
  background:#1e1e2f;
  color:white;
}

/* LOGIN */
#login{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:300px;
  text-align:center;
}

input, select{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* BOTÃO PADRÃO */
.btn{
  background:#7b1e57;
  color:white;
}

/* APP */
#app{
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  height:100vh;
  background:#7b1e57;
  color:white;
  padding:20px;
}

.sidebar h2{
  text-align:center;
}

.sidebar button{
  width:100%;
  margin:8px 0;
  background:rgba(255,255,255,0.1);
  color:white;
}

/* MAIN */
.main{
  flex:1;
  padding:20px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

/* CARDS */
.card{
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.dark .card{
  background:#2a2a40;
  color:white;
}

/* STATUS */
.status{
  padding:5px 10px;
  border-radius:20px;
  font-size:12px;
}

.ativo{background:#28a745;color:white;}
.vencer{background:#ffc107;}
.finalizado{background:#6c757d;color:white;}
.deferido{background:#007bff;color:white;}
.indeferido{background:#dc3545;color:white;}

.actions{
  margin-top:10px;
}

.actions button{
  margin-right:5px;
}

.hidden{display:none;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>SIJ PRO</h2>
  <input id="email" placeholder="Email">
  <input id="senha" type="password" placeholder="Senha">
  <button class="btn" onclick="entrar()">Entrar</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

<div class="sidebar">
  <h2>SIJ</h2>
  <button onclick="mostrar('processos')">Processos</button>
  <button onclick="mostrar('novo')">Novo</button>
  <button onclick="toggleDark()">🌙 Modo</button>
  <button onclick="sair()">Sair</button>
</div>

<div class="main">

<div class="header">
  <h2>Processos</h2>
</div>

<!-- FORM -->
<div id="novo" class="hidden">
<input id="titulo" placeholder="Título">
<select id="area">
<option>Cível</option>
<option>Previdenciário</option>
<option>Família</option>
<option>Trabalhista</option>
</select>
<input id="parte" placeholder="Parte">
<input id="prazo" type="date">
<button class="btn" onclick="salvar()">Salvar</button>
</div>

<!-- LISTA -->
<div id="processos"></div>

</div>
</div>

<script>

let editando=null

function entrar(){
  if(email.value && senha.value){
    login.classList.add("hidden")
    app.classList.remove("hidden")
    listar()
  }
}

function sair(){
  app.classList.add("hidden")
  login.classList.remove("hidden")
}

function toggleDark(){
  document.body.classList.toggle("dark")
}

function mostrar(t){
  novo.classList.add("hidden")
  processos.classList.add("hidden")

  if(t==="novo"){
    novo.classList.remove("hidden")
  }else{
    processos.classList.remove("hidden")
  }
}

function salvar(){
  let dados = JSON.parse(localStorage.getItem("dados")||"[]")

  if(editando){
    let p = dados.find(x=>x.id===editando)
    p.titulo=titulo.value
    p.area=area.value
    p.parte=parte.value
    p.prazo=prazo.value
  }else{
    dados.push({
      id:Date.now(),
      titulo:titulo.value,
      area:area.value,
      parte:parte.value,
      prazo:prazo.value,
      status:"ativo",
      data:new Date().toLocaleDateString()
    })
  }

  localStorage.setItem("dados",JSON.stringify(dados))
  listar()
  mostrar("processos")
  editando=null
}

function listar(){
  let dados = JSON.parse(localStorage.getItem("dados")||"[]")
  processos.innerHTML=""

  dados.forEach(p=>{
    processos.innerHTML+=`
    <div class="card">
      <span class="status ${p.status}">${p.status}</span><br>
      <b>${p.titulo}</b><br>
      ${p.area} - ${p.parte}<br>
      Prazo: ${p.prazo || "—"}<br>
      <small>Criado: ${p.data}</small>

      <div class="actions">
        <button onclick="editar(${p.id})">Editar</button>
        <button onclick="excluir(${p.id})">Excluir</button>
      </div>
    </div>`
  })
}

function editar(id){
  let dados = JSON.parse(localStorage.getItem("dados"))
  let p = dados.find(x=>x.id===id)

  titulo.value=p.titulo
  area.value=p.area
  parte.value=p.parte
  prazo.value=p.prazo

  editando=id
  mostrar("novo")
}

function excluir(id){
  let dados = JSON.parse(localStorage.getItem("dados"))
  dados = dados.filter(p=>p.id!==id)
  localStorage.setItem("dados",JSON.stringify(dados))
  listar()
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>SIJ PRO</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: linear-gradient(135deg,#2b0a2e,#5a0f3d,#7b1e4f);
  color:white;
  text-align:center;
}

/* LOGIN */
#login{
  margin-top:150px;
}

.container{
  width:300px;
  margin:20px auto;
}

input, select, button{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:8px;
}

button{
  background:linear-gradient(90deg,#ff416c,#ff4b2b);
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.card{
  background:white;
  color:black;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
}

.hidden{
  display:none;
}
</style>

</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>SIJ</h2>
  <div class="container">
    <input id="email" placeholder="Email">
    <input id="senha" type="password" placeholder="Senha">
    <button onclick="entrar()">Entrar</button>
  </div>
</div>

<!-- SISTEMA -->
<div id="app" class="hidden">

<div class="container">

<button onclick="sair()">Sair</button>

<input id="titulo" placeholder="Título">

<select id="area">
  <option>Cível</option>
  <option>Previdenciário</option>
  <option>Família</option>
  <option>Trabalhista</option>
  <option>Penal</option>
</select>

<input id="parte" placeholder="Nome da parte">
<input id="descricao" placeholder="Descrição">
<input id="prazo" type="date">
<input id="arquivo" type="file">

<button onclick="salvar()">Salvar</button>

<h3>Prazos próximos</h3>
<div id="alertas"></div>

<h3>Processos</h3>
<div id="lista"></div>

</div>
</div>

<script>

// ===== LOGIN =====
function entrar(){
  if(email.value && senha.value){
    localStorage.setItem("logado", "sim")
    iniciar()
  }else{
    alert("Preenche email e senha")
  }
}

function sair(){
  localStorage.removeItem("logado")
  location.reload()
}

// ===== INICIAR =====
function iniciar(){
  document.getElementById("login").classList.add("hidden")
  document.getElementById("app").classList.remove("hidden")
  listar()
}

// ===== BANCO LOCAL =====
function getProcessos(){
  return JSON.parse(localStorage.getItem("processos") || "[]")
}

function salvarProcessos(lista){
  localStorage.setItem("processos", JSON.stringify(lista))
}

// ===== SALVAR =====
function salvar(){

  let lista = getProcessos()

  const novo = {
    id: Date.now(),
    titulo: titulo.value,
    area: area.value,
    parte: parte.value,
    descricao: descricao.value,
    prazo: prazo.value,
    data: new Date().toLocaleDateString(),
    arquivo: arquivo.files[0]?.name || "nenhum"
  }

  lista.push(novo)
  salvarProcessos(lista)

  limpar()
  listar()
}

// ===== LISTAR =====
function listar(){

  let listaDados = getProcessos()

  lista.innerHTML=""
  alertas.innerHTML=""

  const hoje = new Date()

  listaDados.forEach(p=>{

    lista.innerHTML += `
      <div class="card">
        <b>${p.titulo}</b><br>
        Área: ${p.area}<br>
        Parte: ${p.parte}<br>
        Criado: ${p.data}<br>
        Prazo: ${p.prazo || "sem prazo"}<br>
        Arquivo: ${p.arquivo}<br><br>

        <button onclick="excluir(${p.id})">Excluir</button>
      </div>
    `

    if(p.prazo){
      let prazoData = new Date(p.prazo)
      let diff = (prazoData - hoje)/(1000*60*60*24)

      if(diff <= 3){
        alertas.innerHTML += `
          <div class="card">
            ⚠️ ${p.titulo} vence em ${Math.ceil(diff)} dia(s)
          </div>
        `
      }
    }

  })
}

// ===== EXCLUIR =====
function excluir(id){
  let lista = getProcessos().filter(p => p.id !== id)
  salvarProcessos(lista)
  listar()
}

// ===== LIMPAR =====
function limpar(){
  titulo.value=""
  parte.value=""
  descricao.value=""
  prazo.value=""
}

// ===== AUTO LOGIN =====
if(localStorage.getItem("logado")){
  iniciar()
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>SIJ PRO</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#f5f6fa;
}

/* SIDEBAR */
.sidebar{
  width:70px;
  height:100vh;
  position:fixed;
  background:linear-gradient(180deg,#2e1065,#4c1d95);
  display:flex;
  flex-direction:column;
  align-items:center;
  padding-top:20px;
}

.sidebar i{
  color:#cbd5e1;
  font-size:22px;
  margin:18px 0;
  cursor:pointer;
}

.sidebar i:hover{
  color:white;
}

/* TOP */
.top{
  margin-left:70px;
  height:60px;
  background:white;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 25px;
  border-bottom:1px solid #eee;
}

.logo{
  font-weight:600;
}

.user{
  display:flex;
  align-items:center;
  gap:10px;
  cursor:pointer;
}

.user img{
  width:35px;
  height:35px;
  border-radius:50%;
}

/* MAIN */
.main{
  margin-left:70px;
  padding:25px;
}

/* DASH */
.cards{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
  margin-top:15px;
}

.card{
  background:white;
  padding:18px;
  border-radius:10px;
  border:1px solid #eee;
}

/* PROCESSOS */
.form{
  display:flex;
  gap:10px;
  margin-top:15px;
  flex-wrap:wrap;
}

.form input{
  padding:8px;
  border:1px solid #ccc;
  border-radius:5px;
}

.form button{
  background:#4c1d95;
  color:white;
  border:none;
  padding:8px 15px;
  border-radius:5px;
  cursor:pointer;
}

.lista{
  margin-top:20px;
}

.item{
  background:white;
  padding:15px;
  border-radius:8px;
  margin-bottom:10px;
  border:1px solid #eee;
}

/* PERFIL */
.perfil img{
  width:80px;
  height:80px;
  border-radius:50%;
  margin-bottom:10px;
}

.perfil input{
  display:block;
  margin:10px 0;
  padding:8px;
}

.perfil button{
  background:#4c1d95;
  color:white;
  border:none;
  padding:8px 15px;
  border-radius:5px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="sidebar">
  <i class="ri-home-line" onclick="trocar('dash')"></i>
  <i class="ri-file-list-3-line" onclick="trocar('processos')"></i>
  <i class="ri-calendar-line" onclick="trocar('agenda')"></i>
  <i class="ri-user-line" onclick="trocar('perfil')"></i>
</div>

<div class="top">
  <div class="logo">SIJ PRO</div>

  <div class="user" onclick="trocar('perfil')">
    <img id="fotoTopo" src="https://i.imgur.com/6VBx3io.png">
    <span id="nomeTopo">Usuário</span>
  </div>
</div>

<div class="main">

<!-- DASH -->
<div id="dash">
  <h2>Dashboard</h2>

  <div class="cards">
    <div class="card">Processos: <span id="countProc">0</span></div>
    <div class="card">Tarefas: 5</div>
    <div class="card">Prazos: 3</div>
    <div class="card">Financeiro: R$ 2.500</div>
  </div>
</div>

<!-- PROCESSOS -->
<div id="processos" style="display:none">
  <h2>Processos</h2>

  <div class="form">
    <input id="titulo" placeholder="Título">
    <input id="parte" placeholder="Parte">
    <input type="file" id="anexo">
    <button onclick="add()">Adicionar</button>
  </div>

  <div id="lista" class="lista"></div>
</div>

<!-- AGENDA -->
<div id="agenda" style="display:none">
  <h2>Agenda</h2>
  <p>(vamos colocar calendário real depois)</p>
</div>

<!-- PERFIL -->
<div id="perfil" style="display:none" class="perfil">
  <h2>Perfil</h2>

  <img id="previewFoto" src="https://i.imgur.com/6VBx3io.png">

  <input id="nomeInput" placeholder="Nome">
  <input type="file" id="fotoInput">

  <button onclick="salvarPerfil()">Salvar Perfil</button>
</div>

</div>

<script>
let processos = []

function trocar(id){
  ["dash","processos","agenda","perfil"].forEach(p=>{
    document.getElementById(p).style.display="none"
  })
  document.getElementById(id).style.display="block"
}

function add(){
  let titulo = document.getElementById("titulo").value
  let parte = document.getElementById("parte").value
  let file = document.getElementById("anexo").files[0]

  let url = file ? URL.createObjectURL(file) : null

  processos.push({titulo,parte,anexo:url})

  render()
}

function render(){
  let lista = document.getElementById("lista")
  lista.innerHTML=""

  processos.forEach(p=>{
    lista.innerHTML += `
      <div class="item">
        <b>${p.titulo}</b><br>
        Parte: ${p.parte}<br>
        ${p.anexo ? `<a href="${p.anexo}" target="_blank">Ver anexo</a>` : "Sem anexo"}
      </div>
    `
  })

  document.getElementById("countProc").innerText = processos.length
}

function salvarPerfil(){
  let nome = document.getElementById("nomeInput").value
  let foto = document.getElementById("fotoInput").files[0]

  if(nome){
    localStorage.setItem("nome",nome)
    document.getElementById("nomeTopo").innerText = nome
  }

  if(foto){
    let url = URL.createObjectURL(foto)
    localStorage.setItem("foto",url)

    document.getElementById("fotoTopo").src = url
    document.getElementById("previewFoto").src = url
  }
}

window.onload = ()=>{
  let nome = localStorage.getItem("nome")
  let foto = localStorage.getItem("foto")

  if(nome){
    document.getElementById("nomeTopo").innerText = nome
  }

  if(foto){
    document.getElementById("fotoTopo").src = foto
    document.getElementById("previewFoto").src = foto
  }
}
</script>

</body>
</html>

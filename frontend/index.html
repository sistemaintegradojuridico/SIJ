<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>SIJ</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;

    /* FUNDO VINHO COM TEXTURA */
    background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.05) 1px, transparent 1px),
        radial-gradient(circle at 80% 80%, rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(135deg, #3a0015, #5c0125, #2a0012);

    background-size: 30px 30px, 40px 40px, cover;

    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* CARD CENTRAL */
.container {
    width: 280px;
    background: #f4f4f4;
    padding: 25px;
    border-radius: 12px;
    text-align: center;

    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}

/* LOGO */
.logo {
    font-size: 22px;
    margin-bottom: 15px;
    color: #5c0125;
    font-weight: bold;
}

/* INPUTS */
input {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
}

/* BOTÃO */
button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border: none;
    border-radius: 6px;
    background: linear-gradient(135deg, #7a0f2c, #b3123f);
    color: white;
    font-weight: bold;
    cursor: pointer;
}

/* LINK */
.link {
    margin-top: 8px;
    font-size: 13px;
    color: #7a0f2c;
    cursor: pointer;
}

/* APP */
#app {
    display: none;
}
</style>
</head>

<body>

<div class="container">

    <div class="logo">⚖️ SIJ</div>

    <!-- LOGIN -->
    <div id="loginBox">
        <input id="email" placeholder="Email">
        <input id="password" type="password" placeholder="Senha">
        <button onclick="login()">Entrar</button>
        <div class="link" onclick="register()">Criar conta</div>
    </div>

    <!-- SISTEMA -->
    <div id="app">
        <h4>Criar Processo</h4>
        <input id="titulo" placeholder="Título">
        <input id="descricao" placeholder="Descrição">
        <button onclick="criar()">Salvar</button>

        <h4>Processos</h4>
        <ul id="lista"></ul>
    </div>

</div>

<script>
const API = "https://sij-backend.onrender.com"
let token = ""

// LOGIN
async function login() {
    const email = document.getElementById("email").value
    const password = document.getElementById("password").value

    const res = await fetch(API + "/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({email, password})
    })

    const data = await res.json()

    if(data.token){
        token = data.token
        document.getElementById("loginBox").style.display = "none"
        document.getElementById("app").style.display = "block"
        listar()
    } else {
        alert(data.error || "Erro no login")
    }
}

// CADASTRO
async function register() {
    const email = document.getElementById("email").value
    const password = document.getElementById("password").value

    if(!email || !password){
        alert("Preencha email e senha")
        return
    }

    const res = await fetch(API + "/register", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({email, password})
    })

    const data = await res.json()

    if(data.ok){
        alert("Conta criada!")
    } else {
        alert(data.error)
    }
}

// CRIAR PROCESSO
async function criar(){
    const res = await fetch(API + "/processos", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": token
        },
        body: JSON.stringify({
            titulo: document.getElementById("titulo").value,
            descricao: document.getElementById("descricao").value
        })
    })

    const data = await res.json()

    if(data.ok){
        listar()
    } else {
        alert(data.error)
    }
}

// LISTAR
async function listar(){
    const res = await fetch(API + "/processos", {
        headers: {"Authorization": token}
    })

    const data = await res.json()

    const lista = document.getElementById("lista")
    lista.innerHTML = ""

    data.forEach(p => {
        const li = document.createElement("li")
        li.innerText = p.titulo + " - " + p.descricao
        lista.appendChild(li)
    })
}
</script>

</body>
</html>

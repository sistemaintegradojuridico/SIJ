<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>SIJ</title>

<style>
body {
    margin: 0;
    font-family: Arial;

    background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(135deg, #2b0013, #4b0022, #1a000d);

    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.container {
    width: 260px;
    background: #f5f5f5;
    padding: 25px;
    border-radius: 12px;
    text-align: center;
}

input {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border: none;
    border-radius: 6px;
    background: linear-gradient(135deg, #5c0125, #8a0f3a);
    color: white;
    cursor: pointer;
}

.link {
    margin-top: 10px;
    font-size: 13px;
    cursor: pointer;
}

#app {
    display: none;
}
</style>
</head>

<body>

<div class="container">

<h3>⚖️ SIJ</h3>

<div id="loginBox">
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Senha">
    <button onclick="login()">Entrar</button>
    <div class="link" onclick="register()">Criar conta</div>
</div>

<div id="app">
    <button onclick="logout()">Sair</button>

    <h4>Novo Processo</h4>
    <input id="titulo" placeholder="Título">
    <input id="descricao" placeholder="Descrição">
    <button onclick="criar()">Salvar</button>

    <h4>Lista</h4>
    <ul id="lista"></ul>
</div>

</div>

<script>
const API = "https://sij-backend.onrender.com"
let token = localStorage.getItem("token")

if(token){
    showApp()
}

function showApp(){
    document.getElementById("loginBox").style.display = "none"
    document.getElementById("app").style.display = "block"
    listar()
}

function logout(){
    localStorage.removeItem("token")
    location.reload()
}

// LOGIN
async function login(){
    const res = await fetch(API+"/login",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            email:email.value,
            password:password.value
        })
    })

    const data = await res.json()

    if(data.token){
        localStorage.setItem("token",data.token)
        token = data.token
        showApp()
    } else {
        alert(data.error)
    }
}

// REGISTER
async function register(){
    const res = await fetch(API+"/register",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            email:email.value,
            password:password.value
        })
    })

    const data = await res.json()
    alert(data.ok ? "Conta criada" : data.error)
}

// CRIAR
async function criar(){
    await fetch(API+"/processos",{
        method:"POST",
        headers:{
            "Content-Type":"application/json",
            "Authorization":token
        },
        body:JSON.stringify({
            titulo:titulo.value,
            descricao:descricao.value
        })
    })

    listar()
}

// LISTAR
async function listar(){
    const res = await fetch(API+"/processos",{
        headers:{Authorization:token}
    })

    const data = await res.json()

    lista.innerHTML=""

    data.forEach(p=>{
        const li = document.createElement("li")
        li.innerHTML = `
            ${p.titulo} - ${p.descricao}
            <button onclick="excluir(${p.id})">X</button>
        `
        lista.appendChild(li)
    })
}

// EXCLUIR
async function excluir(id){
    await fetch(API+"/processos/"+id,{
        method:"DELETE",
        headers:{Authorization:token}
    })

    listar()
}
</script>

</body>
</html>

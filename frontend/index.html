<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SIJ</title>

<style>
body {
  font-family: Arial;
  background: radial-gradient(circle at top, #5a001f, #2a0010);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.box {
  background: white;
  padding: 25px;
  border-radius: 12px;
  width: 300px;
  text-align: center;
}

input {
  width: 100%;
  margin: 8px 0;
  padding: 10px;
}

button {
  width: 100%;
  padding: 10px;
  background: linear-gradient(45deg,#7a0028,#c0392b);
  color: white;
  border: none;
  margin-top: 10px;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<div class="box" id="loginBox">
  <h2>SIJ</h2>
  <input id="email" placeholder="Email">
  <input id="senha" type="password" placeholder="Senha">
  <button onclick="login()">Entrar</button>
  <button onclick="mostrarCadastro()">Criar conta</button>
</div>

<div class="box hidden" id="cadastroBox">
  <h2>Criar conta</h2>
  <input id="novoEmail" placeholder="Email">
  <input id="novaSenha" type="password" placeholder="Senha">
  <button onclick="register()">Cadastrar</button>
  <button onclick="voltarLogin()">Voltar</button>
</div>

<div class="box hidden" id="appBox">
  <h2>Processos</h2>
  <input id="titulo" placeholder="Título">
  <input id="descricao" placeholder="Descrição">
  <button onclick="criar()">Salvar</button>

  <div id="lista"></div>

  <button onclick="logout()">Sair</button>
</div>

<script>
const API = "https://sij-backend.onrender.com"

let user = null

function mostrarCadastro(){
  loginBox.classList.add("hidden")
  cadastroBox.classList.remove("hidden")
}

function voltarLogin(){
  cadastroBox.classList.add("hidden")
  loginBox.classList.remove("hidden")
}

// REGISTER
async function register(){
  const email = novoEmail.value
  const password = novaSenha.value

  const res = await fetch(API + "/register", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ email, password })
  })

  const data = await res.json()

  if(data.ok){
    alert("Conta criada!")
    voltarLogin()
  } else {
    alert(data.error)
  }
}

// LOGIN
async function login(){
  const email = document.getElementById("email").value
  const password = document.getElementById("senha").value

  const res = await fetch(API + "/login", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ email, password })
  })

  const data = await res.json()

  if(res.ok){
    user = data.user
    loginBox.classList.add("hidden")
    appBox.classList.remove("hidden")
    listar()
  } else {
    alert(data.error)
  }
}

// CRIAR
async function criar(){
  await fetch(API + "/processos", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      titulo: titulo.value,
      descricao: descricao.value,
      user_id: user.id
    })
  })

  listar()
}

// LISTAR
async function listar(){
  const res = await fetch(API + "/processos/" + user.id)
  const data = await res.json()

  lista.innerHTML = ""

  data.forEach(p => {
    lista.innerHTML += `
      <p>
        ${p.titulo} - ${p.descricao}
        <button onclick="deletar(${p.id})">X</button>
      </p>
    `
  })
}

// DELETAR
async function deletar(id){
  await fetch(API + "/processos/" + id, {
    method:"DELETE"
  })

  listar()
}

// LOGOUT
function logout(){
  user = null
  appBox.classList.add("hidden")
  loginBox.classList.remove("hidden")
}
</script>

</body>
</html>

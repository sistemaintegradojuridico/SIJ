<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>SIJ PRO</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#f5f6fa;
}

/* SIDEBAR */
.sidebar{
  width:70px;
  height:100vh;
  position:fixed;
  background:linear-gradient(180deg,#2e1065,#4c1d95);
  display:flex;
  flex-direction:column;
  align-items:center;
  padding-top:20px;
}

.sidebar i{
  color:#cbd5e1;
  font-size:22px;
  margin:18px 0;
  cursor:pointer;
}

.sidebar i:hover{
  color:white;
}

/* TOP */
.top{
  margin-left:70px;
  height:60px;
  background:white;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 25px;
  border-bottom:1px solid #eee;
}

.logo{
  font-weight:600;
}

.user{
  display:flex;
  align-items:center;
  gap:10px;
  cursor:pointer;
}

.user img{
  width:35px;
  height:35px;
  border-radius:50%;
}

/* MAIN */
.main{
  margin-left:70px;
  padding:25px;
}

/* DASH */
.cards{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
  margin-top:15px;
}

.card{
  background:white;
  padding:18px;
  border-radius:10px;
  border:1px solid #eee;
}

/* FORM */
.form{
  display:flex;
  gap:10px;
  margin-top:15px;
}

.form input{
  padding:8px;
  border:1px solid #ccc;
  border-radius:5px;
}

.form button{
  background:#4c1d95;
  color:white;
  border:none;
  padding:8px 15px;
  border-radius:5px;
  cursor:pointer;
}

/* LISTA */
.lista{
  margin-top:20px;
}

.item{
  background:white;
  padding:15px;
  border-radius:8px;
  margin-bottom:10px;
  border:1px solid #eee;
}

/* PERFIL */
.perfil input{
  display:block;
  margin:10px 0;
  padding:8px;
  width:250px;
}

.perfil button{
  background:#4c1d95;
  color:white;
  border:none;
  padding:8px 15px;
  border-radius:5px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="sidebar">
  <i class="ri-home-line" onclick="trocar('dash')"></i>
  <i class="ri-file-list-3-line" onclick="trocar('processos')"></i>
  <i class="ri-calendar-line" onclick="trocar('agenda')"></i>
  <i class="ri-user-line" onclick="trocar('perfil')"></i>
</div>

<div class="top">
  <div class="logo">SIJ PRO</div>

  <div class="user" onclick="trocar('perfil')">
    <img id="foto" src="https://i.imgur.com/6VBx3io.png">
    <span id="nome">Usuário</span>
  </div>
</div>

<div class="main">

<div id="dash">
  <h2>Dashboard</h2>

  <div class="cards">
    <div class="card">Processos: 12</div>
    <div class="card">Tarefas: 5</div>
    <div class="card">Prazos: 3</div>
    <div class="card">Financeiro: R$ 2.500</div>
  </div>
</div>

<div id="processos" style="display:none">
  <h2>Processos</h2>

  <div class="form">
    <input id="titulo" placeholder="Título">
    <input id="parte" placeholder="Parte">
    <button onclick="add()">Adicionar</button>
  </div>

  <div id="lista" class="lista"></div>
</div>

<div id="agenda" style="display:none">
  <h2>Agenda</h2>
  <p>Calendário entra depois</p>
</div>

<div id="perfil" style="display:none" class="perfil">
  <h2>Perfil</h2>

  <input id="nomeInput" placeholder="Nome">
  <input type="file" id="fotoInput">

  <button onclick="salvarPerfil()">Salvar</button>
</div>

</div>

<script>
function trocar(id){
  ["dash","processos","agenda","perfil"].forEach(p=>{
    document.getElementById(p).style.display="none"
  })
  document.getElementById(id).style.display="block"
}

function add(){
  let lista = document.getElementById("lista")

  lista.innerHTML += `
    <div class="item">
      <b>${titulo.value}</b><br>
      ${parte.value}
    </div>
  `
}

function salvarPerfil(){
  let nomeVal = nomeInput.value
  let fotoFile = fotoInput.files[0]

  if(nomeVal){
    localStorage.setItem("nome",nomeVal)
    nome.innerText = nomeVal
  }

  if(fotoFile){
    let url = URL.createObjectURL(fotoFile)
    localStorage.setItem("foto",url)
    foto.src = url
  }
}

window.onload = ()=>{
  if(localStorage.getItem("nome")){
    nome.innerText = localStorage.getItem("nome")
  }
  if(localStorage.getItem("foto")){
    foto.src = localStorage.getItem("foto")
  }
}
</script>

</body>
</html>

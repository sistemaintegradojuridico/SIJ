<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SIJ PRO</title>
</head>

<body>

<h2>SIJ PRO</h2>

<input id="email" placeholder="email">
<input id="senha" placeholder="senha">
<button onclick="login()">Login</button>
<button onclick="register()">Cadastrar</button>

<hr>

<input id="titulo" placeholder="titulo">
<input id="descricao" placeholder="descricao">
<button onclick="criar()">Salvar</button>

<div id="lista"></div>

<hr>

<input id="tema" placeholder="tema petição">
<button onclick="gerar()">Gerar Petição IA</button>
<pre id="resultado"></pre>

<script>
const API="https://sij-backend.onrender.com"
let token=localStorage.getItem("token")

async function register(){
  await fetch(API+"/register",{method:"POST",headers:{"Content-Type":"application/json"},
  body:JSON.stringify({email:email.value,password:senha.value})})
  alert("ok")
}

async function login(){
  const res=await fetch(API+"/login",{method:"POST",headers:{"Content-Type":"application/json"},
  body:JSON.stringify({email:email.value,password:senha.value})})

  const data=await res.json()
  token=data.token
  localStorage.setItem("token",token)
  listar()
}

async function criar(){
  await fetch(API+"/processos",{method:"POST",
  headers:{"Content-Type":"application/json","Authorization":token},
  body:JSON.stringify({titulo:titulo.value,descricao:descricao.value})})
  listar()
}

async function listar(){
  const res=await fetch(API+"/processos",{headers:{"Authorization":token}})
  const data=await res.json()

  lista.innerHTML=""
  data.forEach(p=>{
    lista.innerHTML+=`<p>${p.titulo} <button onclick="del(${p.id})">X</button></p>`
  })
}

async function del(id){
  await fetch(API+"/processos/"+id,{method:"DELETE",headers:{Authorization:token}})
  listar()
}

async function gerar(){
  const res=await fetch(API+"/ia/peticao",{method:"POST",
  headers:{"Content-Type":"application/json","Authorization":token},
  body:JSON.stringify({tema:tema.value})})

  const data=await res.json()
  resultado.innerText=data.texto
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>SIJ - Sistema Jurídico</title>
</head>
<body>

<h1>SIJ - Sistema Jurídico</h1>

<hr>

<h2>Clientes</h2>
<input id="nome" placeholder="Nome">
<input id="email" placeholder="Email">
<input id="telefone" placeholder="Telefone">
<button onclick="addCliente()">Criar Cliente</button>

<hr>

<h2>Processos</h2>
<input id="tituloProcesso" placeholder="Título">
<input id="statusProcesso" placeholder="Status">
<input id="clienteId" placeholder="ID do Cliente">
<button onclick="addProcesso()">Criar Processo</button>

<hr>

<h2>Tarefas</h2>
<input id="tituloTarefa" placeholder="Título">
<input id="processoId" placeholder="ID do Processo">
<button onclick="addTarefa()">Criar Tarefa</button>

<script src="script.js"></script>

<script>
function addCliente() {
  const nome = document.getElementById("nome").value;
  const email = document.getElementById("email").value;
  const telefone = document.getElementById("telefone").value;

  criarCliente(nome, email, telefone);
}

function addProcesso() {
  const titulo = document.getElementById("tituloProcesso").value;
  const status = document.getElementById("statusProcesso").value;
  const cliente_id = document.getElementById("clienteId").value;

  criarProcesso(titulo, status, cliente_id);
}

function addTarefa() {
  const titulo = document.getElementById("tituloTarefa").value;
  const processo_id = document.getElementById("processoId").value;

  criarTarefa(titulo, processo_id);
}
</script>

</body>
</html>

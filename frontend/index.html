<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>SIJ PRO</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: linear-gradient(135deg,#2b0a2e,#5a0f3d,#7b1e4f);
  color:white;
}

/* LOGIN */
#login{
  width:300px;
  margin:120px auto;
  text-align:center;
}

/* APP */
.container{
  width:90%;
  max-width:600px;
  margin:20px auto;
}

input, select, button{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:8px;
  box-sizing:border-box;
}

button{
  background:linear-gradient(90deg,#ff416c,#ff4b2b);
  color:white;
  font-weight:bold;
  cursor:pointer;
}

/* CARD */
.card{
  background:white;
  color:black;
  padding:15px;
  margin:15px auto;
  border-radius:10px;
}

/* STATUS */
.status{
  padding:5px 12px;
  border-radius:20px;
  font-size:12px;
  display:inline-block;
  margin-bottom:10px;
  cursor:pointer;
}

.ativo{background:#28a745;color:white;}
.vencer{background:#ffc107;color:black;}
.finalizado{background:#6c757d;color:white;}
.deferido{background:#007bff;color:white;}
.indeferido{background:#dc3545;color:white;}

.small{
  font-size:11px;
  color:#666;
}

.hidden{display:none;}

h3{text-align:center;}
</style>

</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>SIJ PRO</h2>
  <input id="email" placeholder="Email">
  <input id="senha" type="password" placeholder="Senha">
  <button onclick="entrar()">Entrar</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

<div class="container">

<button onclick="sair()">Sair</button>

<input id="titulo" placeholder="Título">

<select id="area">
  <option>Cível</option>
  <option>Previdenciário</option>
  <option>Família</option>
  <option>Trabalhista</option>
  <option>Penal</option>
</select>

<input id="parte" placeholder="Nome da parte">
<input id="descricao" placeholder="Descrição">
<input id="prazo" type="date">
<input id="arquivo" type="file">

<button onclick="salvar()">Salvar</button>

</div>

<h3>Processos</h3>
<div id="lista"></div>

</div>

<script>

let editando = null

function entrar(){
  if(email.value && senha.value){
    localStorage.setItem("logado","sim")
    iniciar()
  }
}

function sair(){
  localStorage.clear()
  location.reload()
}

function iniciar(){
  login.classList.add("hidden")
  app.classList.remove("hidden")
  listar()
}

function getDados(){
  return JSON.parse(localStorage.getItem("dados") || "[]")
}

function setDados(d){
  localStorage.setItem("dados", JSON.stringify(d))
}

function salvar(){

  let lista = getDados()

  let file = arquivo.files[0]

  if(editando){
    let p = lista.find(x=>x.id===editando)

    p.titulo = titulo.value
    p.area = area.value
    p.parte = parte.value
    p.descricao = descricao.value
    p.prazo = prazo.value

  }else{

    let reader = new FileReader()

    reader.onload = function(e){

      lista.push({
        id: Date.now(),
        titulo: titulo.value,
        area: area.value,
        parte: parte.value,
        descricao: descricao.value,
        prazo: prazo.value,
        data: new Date().toLocaleDateString(),
        arquivo: e.target.result || null,
        status:"ativo"
      })

      setDados(lista)
      listar()
    }

    if(file){
      reader.readAsDataURL(file)
    }else{
      lista.push({
        id: Date.now(),
        titulo: titulo.value,
        area: area.value,
        parte: parte.value,
        descricao: descricao.value,
        prazo: prazo.value,
        data: new Date().toLocaleDateString(),
        arquivo:null,
        status:"ativo"
      })

      setDados(lista)
      listar()
    }
  }

  limpar()
}

function limpar(){
  titulo.value=""
  parte.value=""
  descricao.value=""
  prazo.value=""
}

function trocarStatus(id){
  let lista = getDados()
  let p = lista.find(x=>x.id===id)

  const ordem = ["ativo","vencer","finalizado","deferido","indeferido"]
  let i = ordem.indexOf(p.status)
  p.status = ordem[(i+1)%ordem.length]

  setDados(lista)
  listar()
}

function editar(id){
  let lista = getDados()
  let p = lista.find(x=>x.id===id)

  titulo.value = p.titulo
  area.value = p.area
  parte.value = p.parte
  descricao.value = p.descricao
  prazo.value = p.prazo

  editando = id
}

function excluir(id){
  let lista = getDados().filter(p=>p.id!==id)
  setDados(lista)
  listar()
}

function listar(){

  let dados = getDados()
  lista.innerHTML=""

  dados.forEach(p=>{

    lista.innerHTML += `
      <div class="card">

        <div class="status ${p.status}" onclick="trocarStatus(${p.id})">
          ${p.status}
        </div>

        <b>${p.titulo}</b><br>
        Área: ${p.area}<br>
        Parte: ${p.parte}<br>
        Prazo: ${p.prazo || "sem prazo"}<br>

        ${p.arquivo ? `<a href="${p.arquivo}" target="_blank">📎 Ver Anexo</a><br>` : ""}

        <div class="small">Criado em ${p.data}</div>

        <br>
        <button onclick="editar(${p.id})">Editar</button>
        <button onclick="excluir(${p.id})">Excluir</button>

      </div>
    `
  })
}

if(localStorage.getItem("logado") === "sim"){
  iniciar()
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>SIJ PRO</title>

<style>

/* ===== VARIÁVEIS ===== */
:root{
  --roxo:#5b21b6;
  --roxo-escuro:#3b0764;
  --bg:#f4f6fb;
  --card:#ffffff;
  --text:#1f2937;
  --border:#e5e7eb;
}

.dark{
  --bg:#0f172a;
  --card:#1e293b;
  --text:#e5e7eb;
  --border:#334155;
}

/* ===== GLOBAL ===== */
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* ===== LOGIN ===== */
#login{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#5b21b6,#9333ea,#3b0764);
}

.login-box{
  width:320px;
  padding:30px;
  border-radius:16px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  text-align:center;
  color:white;
}

.login-box input{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:8px;
}

.login-box button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#2e1065;
  color:white;
}

/* ===== APP ===== */
#app{display:none}

/* ===== SIDEBAR ===== */
.sidebar{
  width:240px;
  height:100vh;
  position:fixed;
  background:linear-gradient(#5b21b6,#3b0764);
  padding:20px;
  color:white;
  box-sizing:border-box;
}

.sidebar h2{
  margin-bottom:25px;
}

.sidebar button{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border:none;
  border-radius:8px;
  background:rgba(255,255,255,0.1);
  color:white;
  cursor:pointer;
}

/* ===== MAIN ===== */
.main{
  margin-left:240px;
  padding:30px;
}

/* ===== HEADER ===== */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

/* ===== FORM ===== */
.form{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:20px;
}

.form input, .form select{
  padding:10px;
  border-radius:8px;
  border:1px solid var(--border);
}

.form button{
  grid-column:span 2;
  padding:12px;
  border:none;
  border-radius:8px;
  background:var(--roxo-escuro);
  color:white;
  cursor:pointer;
}

/* ===== GRID ===== */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:15px;
}

/* ===== CARD ===== */
.card{
  background:var(--card);
  border-radius:12px;
  padding:18px;
  border:1px solid var(--border);
  position:relative;
}

/* ===== STATUS ===== */
.status{
  display:inline-block;
  padding:4px 10px;
  border-radius:20px;
  font-size:12px;
  color:white;
  cursor:pointer;
}

.ativo{background:#22c55e}
.vencer{background:#eab308;color:black}
.finalizado{background:#6b7280}
.deferido{background:#3b82f6}
.indeferido{background:#ef4444}

/* ===== ACTIONS ===== */
.actions{
  position:absolute;
  top:10px;
  right:10px;
}

.actions button{
  padding:5px 8px;
  font-size:11px;
  border:none;
  border-radius:6px;
  margin-left:5px;
  cursor:pointer;
}

.edit{background:var(--roxo);color:white}
.delete{background:#ef4444;color:white}

/* ===== ALERTA ===== */
.alerta{
  border-left:4px solid red;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <h2>SIJ PRO</h2>
    <input id="email" placeholder="Email">
    <input id="senha" type="password" placeholder="Senha">
    <button onclick="entrar()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div id="app">

<div class="sidebar">
  <h2>SIJ</h2>
  <button onclick="toggleTema()">🌗 Tema</button>
  <button onclick="sair()">Sair</button>
</div>

<div class="main">

<div class="header">
  <h2>Processos</h2>
</div>

<div class="form">
  <input id="titulo" placeholder="Título">
  <input id="parte" placeholder="Parte">
  <select id="area">
    <option>Cível</option>
    <option>Previdenciário</option>
    <option>Família</option>
    <option>Trabalhista</option>
  </select>
  <input type="date" id="prazo">
  <select id="status">
    <option value="ativo">Ativo</option>
    <option value="vencer">A vencer</option>
    <option value="finalizado">Finalizado</option>
    <option value="deferido">Deferido</option>
    <option value="indeferido">Indeferido</option>
  </select>
  <input type="file" id="file">
  <button onclick="salvar()">Salvar Processo</button>
</div>

<div id="lista" class="grid"></div>

</div>
</div>

<script>

let editando=null

function entrar(){
  login.style.display="none"
  app.style.display="block"
  render()
}

function sair(){
  app.style.display="none"
  login.style.display="flex"
}

function salvar(){
  let dados = JSON.parse(localStorage.getItem("dados")||"[]")

  let f = file.files[0]
  let url = f ? URL.createObjectURL(f) : null

  if(editando){
    let p = dados.find(x=>x.id===editando)
    p.titulo=titulo.value
    p.parte=parte.value
    p.area=area.value
    p.prazo=prazo.value
    p.status=status.value
    if(url) p.file=url
    editando=null
  }else{
    dados.push({
      id:Date.now(),
      titulo:titulo.value,
      parte:parte.value,
      area:area.value,
      prazo:prazo.value,
      status:status.value,
      file:url,
      data:new Date().toLocaleDateString()
    })
  }

  localStorage.setItem("dados",JSON.stringify(dados))
  render()
}

function render(){
  let dados = JSON.parse(localStorage.getItem("dados")||"[]")
  lista.innerHTML=""

  let hoje = new Date().toISOString().split("T")[0]

  dados.forEach(p=>{
    let alerta = (p.prazo && p.prazo < hoje) ? "alerta" : ""

    lista.innerHTML+=`
    <div class="card ${alerta}">
      <div class="actions">
        <button class="edit" onclick="editar(${p.id})">Editar</button>
        <button class="delete" onclick="excluir(${p.id})">Excluir</button>
      </div>

      <div class="status ${p.status}" onclick="trocarStatus(${p.id})">${p.status}</div>

      <h3>${p.titulo}</h3>
      <p><b>Área:</b> ${p.area}</p>
      <p><b>Parte:</b> ${p.parte}</p>
      <p><b>Prazo:</b> ${p.prazo || "-"}</p>

      ${p.file ? `<a href="${p.file}" target="_blank">📎 Ver anexo</a>` : ""}

      <br><small>Criado: ${p.data}</small>
    </div>`
  })
}

function trocarStatus(id){
  let dados = JSON.parse(localStorage.getItem("dados"))
  let ordem=["ativo","vencer","finalizado","deferido","indeferido"]

  let p = dados.find(x=>x.id===id)
  let i = ordem.indexOf(p.status)
  p.status = ordem[(i+1)%ordem.length]

  localStorage.setItem("dados",JSON.stringify(dados))
  render()
}

function editar(id){
  let dados = JSON.parse(localStorage.getItem("dados"))
  let p = dados.find(x=>x.id===id)

  titulo.value=p.titulo
  parte.value=p.parte
  area.value=p.area
  prazo.value=p.prazo
  status.value=p.status

  editando=id
}

function excluir(id){
  let dados = JSON.parse(localStorage.getItem("dados"))
  dados = dados.filter(p=>p.id!==id)
  localStorage.setItem("dados",JSON.stringify(dados))
  render()
}

function toggleTema(){
  document.body.classList.toggle("dark")
}

</script>

</body>
</html>

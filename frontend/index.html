<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>SIJ PRO</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#3b0a45,#7a1c5c,#a8325f);
  color:white;
}

/* LOGIN */
#login{
  width:300px;
  margin:120px auto;
  text-align:center;
}

input, select, button{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:10px;
  box-sizing:border-box;
}

button{
  background:linear-gradient(90deg,#ff416c,#ff4b2b);
  color:white;
  cursor:pointer;
  font-weight:bold;
}

/* APP */
#app{
  display:flex;
}

/* MENU */
.sidebar{
  width:220px;
  height:100vh;
  background:#1a1a2e;
  padding:20px;
}

.sidebar h2{
  text-align:center;
}

.sidebar button{
  background:#292944;
}

/* CONTEÚDO */
.main{
  flex:1;
  padding:20px;
}

/* FORM */
.form{
  max-width:500px;
}

/* CARD */
.card{
  background:white;
  color:black;
  padding:15px;
  margin:15px 0;
  border-radius:12px;
}

/* STATUS */
.status{
  padding:5px 12px;
  border-radius:20px;
  font-size:12px;
  display:inline-block;
  margin-bottom:10px;
  cursor:pointer;
}

.ativo{background:#28a745;color:white;}
.vencer{background:#ffc107;color:black;}
.finalizado{background:#6c757d;color:white;}
.deferido{background:#007bff;color:white;}
.indeferido{background:#dc3545;color:white;}

.small{
  font-size:11px;
  color:#555;
}

.hidden{display:none;}
</style>

</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>SIJ PRO</h2>
  <input id="email" placeholder="Email">
  <input id="senha" type="password" placeholder="Senha">
  <button onclick="entrar()">Entrar</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

<!-- MENU -->
<div class="sidebar">
  <h2>SIJ</h2>
  <button onclick="mostrar('processos')">Processos</button>
  <button onclick="mostrar('novo')">Novo Processo</button>
  <button onclick="sair()">Sair</button>
</div>

<!-- CONTEÚDO -->
<div class="main">

<!-- NOVO -->
<div id="novo" class="form hidden">

<h3>Novo Processo</h3>

<input id="titulo" placeholder="Título">

<select id="area">
  <option>Cível</option>
  <option>Previdenciário</option>
  <option>Família</option>
  <option>Trabalhista</option>
  <option>Penal</option>
</select>

<input id="parte" placeholder="Nome da parte">
<input id="descricao" placeholder="Descrição">
<input id="prazo" type="date">
<input id="arquivo" type="file">

<button onclick="salvar()">Salvar</button>

</div>

<!-- LISTA -->
<div id="processos">
<h3>Processos</h3>
<div id="lista"></div>
</div>

</div>
</div>

<script>

let editando = null

function entrar(){
  if(email.value && senha.value){
    localStorage.setItem("logado","sim")
    iniciar()
  }
}

function sair(){
  localStorage.clear()
  location.reload()
}

function iniciar(){
  document.getElementById("login").classList.add("hidden")
  document.getElementById("app").classList.remove("hidden")
  mostrar("processos")
  listar()
}

function mostrar(tela){
  document.getElementById("novo").classList.add("hidden")
  document.getElementById("processos").classList.add("hidden")
  document.getElementById(tela).classList.remove("hidden")
}

function getDados(){
  return JSON.parse(localStorage.getItem("dados") || "[]")
}

function setDados(d){
  localStorage.setItem("dados", JSON.stringify(d))
}

function salvar(){

  let lista = getDados()
  let file = document.getElementById("arquivo").files[0]

  let reader = new FileReader()

  reader.onload = function(e){

    if(editando){
      let p = lista.find(x=>x.id===editando)
      p.titulo = titulo.value
      p.area = area.value
      p.parte = parte.value
      p.descricao = descricao.value
      p.prazo = prazo.value
    }else{
      lista.push({
        id: Date.now(),
        titulo: titulo.value,
        area: area.value,
        parte: parte.value,
        descricao: descricao.value,
        prazo: prazo.value,
        data: new Date().toLocaleDateString(),
        arquivo: e.target.result || null,
        status:"ativo"
      })
    }

    setDados(lista)
    listar()
    mostrar("processos")
    limpar()
    editando = null
  }

  if(file){
    reader.readAsDataURL(file)
  }else{
    reader.onload({target:{result:null}})
  }
}

function limpar(){
  titulo.value=""
  parte.value=""
  descricao.value=""
  prazo.value=""
}

function trocarStatus(id){
  let lista = getDados()
  let p = lista.find(x=>x.id===id)

  const ordem = ["ativo","vencer","finalizado","deferido","indeferido"]
  let i = ordem.indexOf(p.status)
  p.status = ordem[(i+1)%ordem.length]

  setDados(lista)
  listar()
}

function editar(id){
  let lista = getDados()
  let p = lista.find(x=>x.id===id)

  titulo.value = p.titulo
  area.value = p.area
  parte.value = p.parte
  descricao.value = p.descricao
  prazo.value = p.prazo

  editando = id
  mostrar("novo")
}

function excluir(id){
  let lista = getDados().filter(p=>p.id!==id)
  setDados(lista)
  listar()
}

function listar(){

  let dados = getDados()
  lista.innerHTML=""

  dados.forEach(p=>{

    lista.innerHTML += `
      <div class="card">

        <div class="status ${p.status}" onclick="trocarStatus(${p.id})">
          ${p.status}
        </div>

        <b>${p.titulo}</b><br>
        Área: ${p.area}<br>
        Parte: ${p.parte}<br>
        Prazo: ${p.prazo || "sem prazo"}<br>

        ${p.arquivo ? `<a href="${p.arquivo}" target="_blank">📎 Ver Anexo</a><br>` : ""}

        <div class="small">Criado em ${p.data}</div>

        <br>
        <button onclick="editar(${p.id})">Editar</button>
        <button onclick="excluir(${p.id})">Excluir</button>

      </div>
    `
  })
}

/* CONTROLE DE LOGIN CORRETO */
window.onload = function(){
  if(localStorage.getItem("logado") === "sim"){
    iniciar()
  }else{
    document.getElementById("login").classList.remove("hidden")
    document.getElementById("app").classList.add("hidden")
  }
}

</script>

</body>
</html>

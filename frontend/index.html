<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>SIJ PRO</title>

<style>

/* ===== TEMA ===== */
:root{
  --roxo:#2e1065;
  --roxo2:#5b21b6;
  --bg:#f4f6fb;
  --card:#ffffff;
  --text:#1f2937;
}

.dark{
  --bg:#0f172a;
  --card:#1e293b;
  --text:#e5e7eb;
}

/* ===== BASE ===== */
body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

/* ===== LOGIN ===== */
#login{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#5b21b6,#9333ea,#2e1065);
}

.box{
  width:320px;
  padding:30px;
  border-radius:15px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  text-align:center;
  color:white;
}

input{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:8px;
  border:none;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  background:#2e1065;
  color:white;
  cursor:pointer;
}

/* ===== APP ===== */
#app{display:none}

/* SIDEBAR */
.sidebar{
  width:70px;
  height:100vh;
  position:fixed;
  background:linear-gradient(#2e1065,#5b21b6);
  display:flex;
  flex-direction:column;
  align-items:center;
  padding-top:20px;
}

.icon{
  margin:15px 0;
  font-size:20px;
  cursor:pointer;
  color:#ddd;
}

/* TOPBAR */
.topbar{
  margin-left:70px;
  height:60px;
  background:var(--card);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
  box-shadow:0 2px 5px rgba(0,0,0,0.05);
}

/* MAIN */
.main{
  margin-left:70px;
  padding:20px;
}

/* CARD */
.card{
  background:var(--card);
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
}

/* STATUS */
.status{
  padding:4px 10px;
  border-radius:20px;
  font-size:12px;
  color:white;
}

.ativo{background:#22c55e}
.vencer{background:#eab308;color:black}
.finalizado{background:#6b7280}

/* LISTA */
.linha{
  display:flex;
  justify-content:space-between;
  padding:10px;
  border-bottom:1px solid #ddd;
}

/* BOTÕES */
.small{
  padding:5px 8px;
  font-size:11px;
}

.edit{background:#5b21b6}
.delete{background:#ef4444}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="box">
    <h2>SIJ PRO</h2>
    <input placeholder="Email">
    <input type="password" placeholder="Senha">
    <button onclick="entrar()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div id="app">

<div class="sidebar">
  <div class="icon" onclick="tela('dashboard')">🏠</div>
  <div class="icon" onclick="tela('processos')">📁</div>
  <div class="icon" onclick="tela('tarefas')">✅</div>
  <div class="icon" onclick="tela('agenda')">📅</div>
  <div class="icon" onclick="tela('financeiro')">💰</div>
  <div class="icon" onclick="toggleTema()">🌗</div>
</div>

<div class="topbar">
  <input placeholder="Buscar..." style="width:300px">
  <div>👤 Usuário</div>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard">
<h2>Dashboard</h2>

<div class="grid">
  <div class="card">Processos: <span id="totalProc"></span></div>
  <div class="card">Tarefas: <span id="totalTarefas"></span></div>
  <div class="card">Financeiro: R$ <span id="totalFin"></span></div>
</div>
</div>

<!-- PROCESSOS -->
<div id="processos" style="display:none">
<h2>Processos</h2>

<input id="titulo" placeholder="Título">
<input id="parte" placeholder="Parte">
<input type="date" id="prazo">

<select id="status">
<option value="ativo">Ativo</option>
<option value="vencer">A vencer</option>
<option value="finalizado">Finalizado</option>
</select>

<button onclick="addProc()">Salvar</button>

<div id="listaProc"></div>
</div>

<!-- TAREFAS -->
<div id="tarefas" style="display:none">
<h2>Tarefas</h2>

<input id="tarefa">
<button onclick="addTarefa()">Adicionar</button>

<div id="listaTarefa"></div>
</div>

<!-- AGENDA -->
<div id="agenda" style="display:none">
<h2>Agenda</h2>
<p>Visual calendário (base pronta)</p>
</div>

<!-- FINANCEIRO -->
<div id="financeiro" style="display:none">
<h2>Financeiro do Escritório</h2>

<input id="valor" placeholder="Valor">
<button onclick="addFin()">Adicionar</button>

<div id="listaFin"></div>
</div>

</div>
</div>

<script>

/* LOGIN */
function entrar(){
  login.style.display="none"
  app.style.display="block"
  render()
}

/* TELAS */
function tela(x){
  document.querySelectorAll(".main > div").forEach(e=>e.style.display="none")
  document.getElementById(x).style.display="block"
}

/* PROCESSOS */
function addProc(){
  let d=JSON.parse(localStorage.proc||"[]")
  d.push({
    t:titulo.value,
    p:parte.value,
    prazo:prazo.value,
    s:status.value
  })
  localStorage.proc=JSON.stringify(d)
  render()
}

function renderProc(){
  let d=JSON.parse(localStorage.proc||"[]")
  listaProc.innerHTML=""

  d.forEach((x,i)=>{
    listaProc.innerHTML+=`
    <div class="linha">
      <div>
        <b>${x.t}</b><br>
        ${x.p} | ${x.prazo}
      </div>

      <div>
        <span class="status ${x.s}">${x.s}</span>
        <button class="small delete" onclick="delProc(${i})">X</button>
      </div>
    </div>`
  })

  totalProc.innerText=d.length
}

function delProc(i){
  let d=JSON.parse(localStorage.proc)
  d.splice(i,1)
  localStorage.proc=JSON.stringify(d)
  render()
}

/* TAREFAS */
function addTarefa(){
  let t=JSON.parse(localStorage.t||"[]")
  t.push(tarefa.value)
  localStorage.t=JSON.stringify(t)
  render()
}

function renderTarefa(){
  let t=JSON.parse(localStorage.t||"[]")
  listaTarefa.innerHTML=""

  t.forEach((x,i)=>{
    listaTarefa.innerHTML+=`
    <div class="linha">
      ${x}
      <button class="small delete" onclick="delT(${i})">X</button>
    </div>`
  })

  totalTarefas.innerText=t.length
}

function delT(i){
  let t=JSON.parse(localStorage.t)
  t.splice(i,1)
  localStorage.t=JSON.stringify(t)
  render()
}

/* FINANCEIRO */
function addFin(){
  let f=JSON.parse(localStorage.f||"[]")
  f.push(Number(valor.value))
  localStorage.f=JSON.stringify(f)
  render()
}

function renderFin(){
  let f=JSON.parse(localStorage.f||"[]")
  listaFin.innerHTML=""
  let total=0

  f.forEach(v=>{
    total+=v
    listaFin.innerHTML+=`<div class="card">R$ ${v}</div>`
  })

  totalFin.innerText=total
}

/* GERAL */
function render(){
  renderProc()
  renderTarefa()
  renderFin()
}

/* TEMA */
function toggleTema(){
  document.body.classList.toggle("dark")
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>SIJ PRO</title>

<style>
body{
  margin:0;
  font-family:Arial;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;

  background: linear-gradient(135deg,#2b0a2e,#5a0f3d,#7b1e4f);
}

/* LOGO */
.logo{
  text-align:center;
  margin-bottom:15px;
}

.logo img{
  width:120px;
  margin-bottom:10px;
}

/* TÍTULO */
h1{
  text-align:center;
  color:#ffd700;
  margin-bottom:20px;
  font-size:20px;
}

/* CAIXA */
.container{
  background:rgba(255,255,255,0.08);
  padding:25px;
  border-radius:15px;
  width:280px;
  backdrop-filter:blur(10px);
  box-shadow:0 0 25px rgba(0,0,0,0.4);
}

/* INPUT + BOTÃO IGUAIS */
input, button{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:8px;
  box-sizing:border-box;
  font-size:14px;
}

/* INPUT */
input{
  background:white;
}

/* BOTÃO */
button{
  background:linear-gradient(90deg,#ff416c,#ff4b2b);
  color:white;
  cursor:pointer;
  font-weight:bold;
}

/* LINK */
.link{
  text-align:center;
  margin-top:10px;
  color:white;
  cursor:pointer;
  font-size:13px;
}

/* ESCONDER */
.hidden{
  display:none;
}

/* APP */
#appBox{
  display:none;
  color:white;
  text-align:center;
}
</style>

</head>

<body>

<div>

  <!-- LOGO -->
  <div class="logo">
    <img src="logo.png">
  </div>

  <h1>SISTEMA INTEGRADO JURÍDICO</h1>

  <div class="container">

    <!-- LOGIN -->
    <div id="loginBox">
      <input id="email" placeholder="Email">
      <input id="senha" type="password" placeholder="Senha">
      <button onclick="login()">Entrar</button>
      <div class="link" onclick="mostrarCadastro()">Criar conta</div>
    </div>

    <!-- CADASTRO -->
    <div id="cadastroBox" class="hidden">
      <input id="novoEmail" placeholder="Email">
      <input id="novaSenha" type="password" placeholder="Senha">
      <button onclick="register()">Cadastrar</button>
      <div class="link" onclick="voltarLogin()">Voltar</div>
    </div>

  </div>

  <!-- APP -->
  <div id="appBox">
    <h2>Bem-vindo ao SIJ 🚀</h2>

    <input id="titulo" placeholder="Título do processo">
    <input id="descricao" placeholder="Descrição">
    <button onclick="criar()">Salvar</button>

    <h3>Processos</h3>
    <div id="lista"></div>
  </div>

</div>

<script>

const API = "https://sij-backend.onrender.com"

let token = null

function mostrarCadastro(){
  loginBox.classList.add("hidden")
  cadastroBox.classList.remove("hidden")
}

function voltarLogin(){
  cadastroBox.classList.add("hidden")
  loginBox.classList.remove("hidden")
}

async function register(){
  const res = await fetch(API + "/register", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      email: novoEmail.value,
      password: novaSenha.value
    })
  })

  const data = await res.json()

  if(res.ok){
    alert("Conta criada!")
    voltarLogin()
  }else{
    alert(data.error)
  }
}

async function login(){
  const res = await fetch(API + "/login", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      email: email.value,
      password: senha.value
    })
  })

  const data = await res.json()

  if(res.ok){
    alert("Login feito 🚀")

    token = data.token

    document.querySelector(".container").style.display="none"
    document.querySelector(".logo").style.display="none"
    document.querySelector("h1").style.display="none"

    document.getElementById("appBox").style.display="block"

    listar()
  }else{
    alert(data.error)
  }
}

async function criar(){
  await fetch(API + "/processos", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":token
    },
    body: JSON.stringify({
      titulo: titulo.value,
      descricao: descricao.value
    })
  })

  listar()
}

async function listar(){
  const res = await fetch(API + "/processos", {
    headers:{ "Authorization":token }
  })

  const dados = await res.json()

  lista.innerHTML=""

  dados.forEach(p=>{
    lista.innerHTML += `
      <div style="margin:10px;padding:10px;background:#fff;color:#000;border-radius:8px">
        <b>${p.titulo}</b><br>
        ${p.descricao}<br>
        <button onclick="deletar('${p.id}')">Excluir</button>
      </div>
    `
  })
}

async function deletar(id){
  await fetch(API + "/processos/"+id, {
    method:"DELETE",
    headers:{ "Authorization":token }
  })

  listar()
}

</script>

</body>
</html>

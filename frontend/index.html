<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>SIJ PRO</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: linear-gradient(135deg,#2b0a2e,#5a0f3d,#7b1e4f);
  color:white;
}

/* LOGIN */
.center{
  width:320px;
  margin:120px auto;
  text-align:center;
}

.container{
  width:350px;
  margin:20px auto;
}

input, select, button{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:10px;
}

button{
  background:linear-gradient(90deg,#ff416c,#ff4b2b);
  color:white;
  font-weight:bold;
  cursor:pointer;
}

/* CARD */
.card{
  width:90%;
  background:white;
  color:black;
  padding:15px;
  margin:10px auto;
  border-radius:12px;
}

/* STATUS */
.status{
  padding:4px 10px;
  border-radius:20px;
  font-size:12px;
  display:inline-block;
  margin-bottom:8px;
  cursor:pointer;
}

.ativo{background:green;color:white;}
.vencer{background:orange;color:white;}
.finalizado{background:gray;color:white;}
.deferido{background:blue;color:white;}
.indeferido{background:red;color:white;}

.small{
  font-size:11px;
  color:gray;
}

.hidden{display:none;}

h3{text-align:center;}
</style>

</head>

<body>

<!-- LOGIN -->
<div id="login" class="center">
  <h2>SIJ PRO</h2>
  <input id="email" placeholder="Email">
  <input id="senha" type="password" placeholder="Senha">
  <button onclick="entrar()">Entrar</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

<div class="container">

<button onclick="sair()">Sair</button>

<input id="titulo" placeholder="Título">

<select id="area">
  <option>Cível</option>
  <option>Previdenciário</option>
  <option>Família</option>
  <option>Trabalhista</option>
  <option>Penal</option>
</select>

<input id="parte" placeholder="Nome da parte">
<input id="descricao" placeholder="Descrição">
<input id="prazo" type="date">
<input id="arquivo" type="file">

<button onclick="salvar()">Salvar</button>

</div>

<h3>Prazos próximos</h3>
<div id="alertas"></div>

<h3>Processos</h3>
<div id="lista"></div>

<h3>Estatística do mês</h3>
<div id="stats"></div>

</div>

<script>

let editando = null

// LOGIN
function entrar(){
  if(email.value && senha.value){
    localStorage.setItem("logado","sim")
    iniciar()
  }else{
    alert("Preencha os dados")
  }
}

function sair(){
  localStorage.clear()
  location.reload()
}

function iniciar(){
  login.classList.add("hidden")
  app.classList.remove("hidden")
  listar()
}

// BANCO
function getDados(){
  return JSON.parse(localStorage.getItem("dados") || "[]")
}

function setDados(d){
  localStorage.setItem("dados", JSON.stringify(d))
}

// DATA HOJE
function hoje(){
  return new Date().toLocaleDateString()
}

// SALVAR
function salvar(){

  let lista = getDados()

  if(editando){
    let p = lista.find(x=>x.id===editando)

    p.titulo = titulo.value
    p.area = area.value
    p.parte = parte.value
    p.descricao = descricao.value
    p.prazo = prazo.value
    p.arquivo = arquivo.files[0]?.name || p.arquivo

    editando = null

  }else{
    lista.push({
      id: Date.now(),
      titulo: titulo.value,
      area: area.value,
      parte: parte.value,
      descricao: descricao.value,
      prazo: prazo.value,
      data: hoje(),
      arquivo: arquivo.files[0]?.name || "nenhum",
      status:"ativo"
    })
  }

  setDados(lista)
  limpar()
  listar()
}

// LIMPAR
function limpar(){
  titulo.value=""
  parte.value=""
  descricao.value=""
  prazo.value=""
}

// STATUS
function trocarStatus(id){
  let lista = getDados()
  let p = lista.find(x=>x.id===id)

  const ordem = ["ativo","vencer","finalizado","deferido","indeferido"]
  let i = ordem.indexOf(p.status)
  p.status = ordem[(i+1)%ordem.length]

  setDados(lista)
  listar()
}

// EDITAR
function editar(id){
  let lista = getDados()
  let p = lista.find(x=>x.id===id)

  titulo.value = p.titulo
  area.value = p.area
  parte.value = p.parte
  descricao.value = p.descricao
  prazo.value = p.prazo

  editando = id
}

// EXCLUIR
function excluir(id){
  let lista = getDados().filter(p=>p.id!==id)
  setDados(lista)
  listar()
}

// LISTAR
function listar(){

  let dados = getDados()
  lista.innerHTML=""
  alertas.innerHTML=""

  let hojeData = new Date()
  let deferidos = 0

  dados.forEach(p=>{

    if(p.status === "deferido") deferidos++

    lista.innerHTML += `
      <div class="card">

        <div class="status ${p.status}" onclick="trocarStatus(${p.id})">
          ${p.status}
        </div>

        <b>${p.titulo}</b><br>
        Área: ${p.area}<br>
        Parte: ${p.parte}<br>
        Prazo: ${p.prazo || "sem prazo"}<br>
        Arquivo: ${p.arquivo}<br>

        <div class="small">Criado em ${p.data}</div>

        <br>
        <button onclick="editar(${p.id})">Editar</button>
        <button onclick="excluir(${p.id})">Excluir</button>

      </div>
    `

    if(p.prazo){
      let prazoData = new Date(p.prazo)
      let diff = (prazoData - hojeData)/(1000*60*60*24)

      if(diff <= 3){
        alertas.innerHTML += `
          <div class="card">
            ⚠️ ${p.titulo} vence em ${Math.ceil(diff)} dia(s)
          </div>
        `
      }
    }

  })

  stats.innerHTML = `
    <div class="card">
      Deferidos no mês: ${deferidos}
    </div>
  `
}

// AUTO LOGIN
if(localStorage.getItem("logado")){
  iniciar()
}

</script>

</body>
</html>

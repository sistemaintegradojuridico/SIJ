<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>SIJ PRO</title>

<style>
:root{
  --roxo:#4b006e;
  --roxo-escuro:#2e0045;
  --bg:#f5f6fa;
  --card:#ffffff;
  --text:#222;
}

.dark{
  --bg:#1e1e2f;
  --card:#2a2a3d;
  --text:#eee;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

/* LOGIN */
#login{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#4b006e,#7b1fa2,#2e0045);
}

.login-box{
  background:rgba(255,255,255,0.1);
  padding:30px;
  border-radius:15px;
  width:320px;
  backdrop-filter:blur(10px);
  text-align:center;
  color:white;
}

input, select{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:8px;
  border:none;
  outline:none;
}

.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:var(--roxo-escuro);
  color:white;
  cursor:pointer;
  transition:0.2s;
}

.btn:hover{
  opacity:0.9;
}

/* APP */
#app{display:none;}

/* SIDEBAR */
.sidebar{
  width:240px;
  height:100vh;
  background:linear-gradient(180deg,#4b006e,#2e0045);
  color:white;
  position:fixed;
  padding:20px;
  box-sizing:border-box;
}

.sidebar h2{
  margin-bottom:25px;
}

.sidebar button{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border:none;
  border-radius:8px;
  background:rgba(255,255,255,0.1);
  color:white;
  cursor:pointer;
}

.sidebar button:hover{
  background:rgba(255,255,255,0.2);
}

/* MAIN */
.main{
  margin-left:240px;
  padding:30px;
  min-height:100vh;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

/* CARD */
.card{
  background:var(--card);
  padding:20px;
  border-radius:12px;
  margin-bottom:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
  position:relative;
}

/* STATUS */
.status{
  display:inline-block;
  padding:5px 12px;
  border-radius:20px;
  font-size:12px;
  color:white;
  margin-bottom:10px;
}

.ativo{background:#28a745;}
.vencer{background:#ffc107;color:black;}
.finalizado{background:#6c757d;}
.deferido{background:#007bff;}
.indeferido{background:#dc3545;}

/* ACTIONS */
.actions{
  position:absolute;
  top:15px;
  right:15px;
}

.actions button{
  border:none;
  padding:6px 10px;
  border-radius:6px;
  margin-left:5px;
  cursor:pointer;
  font-size:12px;
}

.edit{background:var(--roxo);color:white;}
.delete{background:#dc3545;color:white;}

/* FORM */
.form{
  max-width:400px;
  background:var(--card);
  padding:20px;
  border-radius:12px;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <h2>SIJ PRO</h2>

    <input id="email" placeholder="Email">
    <input id="senha" type="password" placeholder="Senha">

    <button class="btn" onclick="entrar()">Entrar</button>

    <div style="font-size:13px;margin-top:10px">
      Criar conta<br>
      Esqueci minha senha
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">

<div class="sidebar">
  <h2>SIJ</h2>

  <button onclick="mostrar('lista')">Processos</button>
  <button onclick="mostrar('novo')">Novo</button>
  <button onclick="toggleTema()">🌗 Tema</button>
  <button onclick="sair()">Sair</button>
</div>

<div class="main">

<div class="header">
  <h2>Processos</h2>
</div>

<!-- FORM -->
<div id="novo" class="form" style="display:none">
<input id="titulo" placeholder="Título">
<select id="area">
<option>Cível</option>
<option>Previdenciário</option>
<option>Família</option>
<option>Trabalhista</option>
</select>
<input id="parte" placeholder="Parte">
<input id="prazo" type="date">

<select id="statusSelect">
<option value="ativo">Ativo</option>
<option value="vencer">A vencer</option>
<option value="finalizado">Finalizado</option>
<option value="deferido">Deferido</option>
<option value="indeferido">Indeferido</option>
</select>

<button class="btn" onclick="salvar()">Salvar</button>
</div>

<!-- LISTA -->
<div id="lista"></div>

</div>
</div>

<script>

let editando=null

function entrar(){
  login.style.display="none"
  app.style.display="block"
  listar()
}

function sair(){
  app.style.display="none"
  login.style.display="flex"
}

function mostrar(t){
  novo.style.display="none"
  if(t==="novo") novo.style.display="block"
}

function salvar(){
  let dados = JSON.parse(localStorage.getItem("dados")||"[]")

  if(editando){
    let p = dados.find(x=>x.id===editando)
    p.titulo=titulo.value
    p.area=area.value
    p.parte=parte.value
    p.prazo=prazo.value
    p.status=statusSelect.value
  }else{
    dados.push({
      id:Date.now(),
      titulo:titulo.value,
      area:area.value,
      parte:parte.value,
      prazo:prazo.value,
      status:statusSelect.value,
      data:new Date().toLocaleDateString()
    })
  }

  localStorage.setItem("dados",JSON.stringify(dados))
  listar()
  novo.style.display="none"
  editando=null
}

function listar(){
  let dados = JSON.parse(localStorage.getItem("dados")||"[]")
  lista.innerHTML=""

  dados.forEach(p=>{
    lista.innerHTML+=`
    <div class="card">

      <div class="actions">
        <button class="edit" onclick="editar(${p.id})">Editar</button>
        <button class="delete" onclick="excluir(${p.id})">Excluir</button>
      </div>

      <div class="status ${p.status}">${p.status}</div>

      <h3>${p.titulo}</h3>

      <p><b>Área:</b> ${p.area}</p>
      <p><b>Parte:</b> ${p.parte}</p>
      <p><b>Prazo:</b> ${p.prazo || "—"}</p>
      <small>Criado: ${p.data}</small>

    </div>`
  })
}

function editar(id){
  let dados = JSON.parse(localStorage.getItem("dados"))
  let p = dados.find(x=>x.id===id)

  titulo.value=p.titulo
  area.value=p.area
  parte.value=p.parte
  prazo.value=p.prazo
  statusSelect.value=p.status

  editando=id
  mostrar("novo")
}

function excluir(id){
  let dados = JSON.parse(localStorage.getItem("dados"))
  dados = dados.filter(p=>p.id!==id)
  localStorage.setItem("dados",JSON.stringify(dados))
  listar()
}

function toggleTema(){
  document.body.classList.toggle("dark")
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>SIJ PRO</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

:root{
  --roxo:#2e1065;
  --bg:#f4f6fb;
  --card:#ffffff;
  --text:#1f2937;
  --icon:#cbd5e1;
}

.dark{
  --bg:#0f172a;
  --card:#1e293b;
  --text:#e5e7eb;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

/* LOGIN */
#login{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#5b21b6,#9333ea,#2e1065);
}

.box{
  width:320px;
  padding:30px;
  border-radius:15px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  text-align:center;
  color:white;
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:8px;
  border:none;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#2e1065;
  color:white;
  cursor:pointer;
}

/* APP */
#app{display:none}

/* SIDEBAR */
.sidebar{
  width:70px;
  height:100vh;
  position:fixed;
  background:linear-gradient(#2e1065,#5b21b6);
  display:flex;
  flex-direction:column;
  align-items:center;
  padding-top:20px;
}

.icon{
  margin:18px 0;
  font-size:18px;
  cursor:pointer;
  color:var(--icon);
}

/* TOPBAR */
.topbar{
  margin-left:70px;
  height:60px;
  background:var(--card);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
}

.top-right{
  display:flex;
  align-items:center;
  gap:15px;
}

.user{
  display:flex;
  align-items:center;
  gap:10px;
  cursor:pointer;
}

.user img{
  width:35px;
  height:35px;
  border-radius:50%;
  object-fit:cover;
}

/* DROPDOWN */
.dropdown{
  position:absolute;
  right:20px;
  top:60px;
  background:var(--card);
  border-radius:10px;
  padding:10px;
  display:none;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.dropdown button{
  width:100%;
  margin-top:5px;
}

/* MAIN */
.main{
  margin-left:70px;
  padding:20px;
}

.card{
  background:var(--card);
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
}

/* LISTA */
.linha{
  display:flex;
  justify-content:space-between;
  padding:12px;
  border-bottom:1px solid #ddd;
}

.status{
  padding:4px 10px;
  border-radius:20px;
  font-size:12px;
  color:white;
}

.ativo{background:#22c55e}
.vencer{background:#eab308;color:black}
.finalizado{background:#6b7280}

.delete{background:#ef4444;padding:5px 8px;font-size:11px}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="box">
    <h2>SIJ PRO</h2>
    <input id="email" placeholder="Email">
    <input id="senha" type="password" placeholder="Senha">
    <input type="file" id="foto">
    <button onclick="entrar()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div id="app">

<div class="sidebar">
  <i class="fa-solid fa-house icon" onclick="tela('dashboard')"></i>
  <i class="fa-solid fa-folder icon" onclick="tela('processos')"></i>
</div>

<div class="topbar">

  <input placeholder="Buscar..." style="width:300px">

  <div class="top-right">

    <i class="fa-solid fa-moon" onclick="toggleTema()"></i>

    <div class="user" onclick="toggleMenu()">
      <img id="userFoto">
      <span id="userEmail"></span>
    </div>

  </div>

</div>

<div class="dropdown" id="menuUser">
  <button onclick="tela('perfil')">Perfil</button>
  <button onclick="sair()">Sair</button>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard">
<h2>Dashboard</h2>
</div>

<!-- PROCESSOS -->
<div id="processos" style="display:none">
<h2>Processos</h2>

<input id="titulo" placeholder="Título">
<input id="parte" placeholder="Parte">
<input type="date" id="prazo">

<select id="status">
<option value="ativo">Ativo</option>
<option value="vencer">A vencer</option>
<option value="finalizado">Finalizado</option>
</select>

<button onclick="addProc()">Salvar</button>

<div id="listaProc"></div>

</div>

<!-- PERFIL -->
<div id="perfil" style="display:none">
<h2>Meu Perfil</h2>

<div class="card">
  <img id="perfilFoto" width="80"><br><br>

  <input id="novoEmail" placeholder="Novo email">
  <input type="file" id="novaFoto">

  <button onclick="salvarPerfil()">Salvar Alterações</button>
</div>

</div>

</div>
</div>

<script>

/* LOGIN */
function entrar(){

  let file = foto.files[0]

  if(file){
    let reader = new FileReader()
    reader.onload = function(e){

      let user = {
        email:email.value,
        foto:e.target.result
      }

      localStorage.user = JSON.stringify(user)
      iniciar()
    }
    reader.readAsDataURL(file)

  }else{
    localStorage.user = JSON.stringify({
      email:email.value,
      foto:"https://i.imgur.com/6VBx3io.png"
    })
    iniciar()
  }
}

/* INICIAR */
function iniciar(){
  login.style.display="none"
  app.style.display="block"

  let u = JSON.parse(localStorage.user)

  userEmail.innerText = u.email
  userFoto.src = u.foto
  perfilFoto.src = u.foto

  render()
}

if(localStorage.user){
  iniciar()
}

/* MENU */
function toggleMenu(){
  menuUser.style.display =
  menuUser.style.display === "block" ? "none" : "block"
}

/* SAIR */
function sair(){
  localStorage.removeItem("user")
  location.reload()
}

/* TELAS */
function tela(x){
  document.querySelectorAll(".main > div").forEach(e=>e.style.display="none")
  document.getElementById(x).style.display="block"
  menuUser.style.display="none"
}

/* PERFIL */
function salvarPerfil(){

  let u = JSON.parse(localStorage.user)

  if(novoEmail.value){
    u.email = novoEmail.value
  }

  let file = novaFoto.files[0]

  if(file){
    let reader = new FileReader()
    reader.onload = function(e){
      u.foto = e.target.result
      salvarUser(u)
    }
    reader.readAsDataURL(file)
  }else{
    salvarUser(u)
  }
}

function salvarUser(u){
  localStorage.user = JSON.stringify(u)
  iniciar()
}

/* PROCESSOS */
function addProc(){
  let d=JSON.parse(localStorage.proc||"[]")
  d.push({
    t:titulo.value,
    p:parte.value,
    prazo:prazo.value,
    s:status.value
  })
  localStorage.proc=JSON.stringify(d)
  render()
}

function renderProc(){
  let d=JSON.parse(localStorage.proc||"[]")
  listaProc.innerHTML=""

  d.forEach((x,i)=>{
    listaProc.innerHTML+=`
    <div class="linha">
      <div>
        <b>${x.t}</b><br>
        ${x.p} | ${x.prazo}
      </div>

      <div>
        <span class="status ${x.s}">${x.s}</span>
        <button class="delete" onclick="delProc(${i})">Excluir</button>
      </div>
    </div>`
  })
}

function delProc(i){
  let d=JSON.parse(localStorage.proc)
  d.splice(i,1)
  localStorage.proc=JSON.stringify(d)
  render()
}

function render(){
  renderProc()
}

/* TEMA */
function toggleTema(){
  document.body.classList.toggle("dark")
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>SIJ PRO</title>

<style>
body{
  margin:0;
  font-family:Arial;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background: linear-gradient(135deg,#2b0a2e,#5a0f3d,#7b1e4f);
}

.container{
  background:rgba(255,255,255,0.08);
  padding:30px 25px;
  border-radius:15px;
  width:260px;
  backdrop-filter:blur(12px);
  box-shadow:0 0 25px rgba(0,0,0,0.4);
  text-align:center;
}

h1{color:#ffd700}

input, button{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:8px;
  box-sizing:border-box;
}

button{
  background:linear-gradient(90deg,#ff416c,#ff4b2b);
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.link{
  color:white;
  font-size:13px;
  cursor:pointer;
}

.hidden{display:none}

#appBox{
  display:none;
  color:white;
  text-align:center;
  width:320px;
}

.card{
  background:white;
  color:black;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
}
</style>

</head>

<body>

<div>

<div class="container" id="authBox">

<h1>SIJ</h1>

<div id="loginBox">
<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>

<div class="link" onclick="mostrarCadastro()">Criar conta</div>
<div class="link" onclick="esqueciSenha()">Esqueci minha senha</div>
</div>

<div id="cadastroBox" class="hidden">
<input id="novoEmail" placeholder="Email">
<input id="novaSenha" type="password" placeholder="Senha">
<button onclick="register()">Cadastrar</button>
<div class="link" onclick="voltarLogin()">Voltar</div>
</div>

</div>

<!-- APP -->
<div id="appBox">

<h2>SIJ</h2>

<button onclick="logout()">Sair</button>

<input id="titulo" placeholder="Título">
<input id="descricao" placeholder="Descrição">
<input id="prazo" type="date">

<!-- ANEXO -->
<input id="arquivo" type="file">

<button onclick="criar()">Salvar</button>

<h3>Prazos próximos</h3>
<div id="alertas"></div>

<h3>Processos</h3>
<div id="lista"></div>

</div>

</div>

<script>

const API = "https://sij-backend.onrender.com"
let token = null

function mostrarCadastro(){
  loginBox.classList.add("hidden")
  cadastroBox.classList.remove("hidden")
}

function voltarLogin(){
  cadastroBox.classList.add("hidden")
  loginBox.classList.remove("hidden")
}

function logout(){
  token = null
  appBox.style.display="none"
  authBox.style.display="block"
}

async function register(){
  await fetch(API + "/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      email: novoEmail.value,
      password: novaSenha.value
    })
  })
  alert("Conta criada!")
  voltarLogin()
}

async function login(){
  const res = await fetch(API + "/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      email: email.value,
      password: senha.value
    })
  })

  const data = await res.json()

  if(res.ok){
    token = data.token
    authBox.style.display="none"
    appBox.style.display="block"
    listar()
  }else{
    alert("Erro login")
  }
}

function esqueciSenha(){
  const emailUser = prompt("Digite seu email:")
  if(emailUser){
    alert("Senha enviada para: " + emailUser)
  }
}

async function criar(){

  const arquivo = document.getElementById("arquivo").files[0]

  await fetch(API + "/processos",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":token
    },
    body: JSON.stringify({
      titulo: titulo.value,
      descricao: descricao.value,
      prazo: prazo.value,
      arquivo: arquivo ? arquivo.name : null
    })
  })

  listar()
}

async function listar(){
  const res = await fetch(API + "/processos",{
    headers:{ "Authorization":token }
  })

  const dados = await res.json()

  lista.innerHTML=""
  alertas.innerHTML=""

  const hoje = new Date()

  dados.forEach(p=>{

    lista.innerHTML += `
      <div class="card">
        <b>${p.titulo}</b><br>
        ${p.descricao}<br>
        Prazo: ${p.prazo || "sem prazo"}<br>
        Arquivo: ${p.arquivo || "nenhum"}<br>
        <button onclick="deletar('${p.id}')">Excluir</button>
      </div>
    `

    if(p.prazo){
      const dataPrazo = new Date(p.prazo)
      const diff = (dataPrazo - hoje) / (1000*60*60*24)

      if(diff <= 2){
        alertas.innerHTML += `
          <div class="card">
            ⚠️ ${p.titulo} vence em breve!
          </div>
        `
      }
    }

  })
}

async function deletar(id){
  await fetch(API + "/processos/"+id,{
    method:"DELETE",
    headers:{ "Authorization":token }
  })
  listar()
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>SIJ PRO</title>

<style>
:root{
  --roxo:#5b21b6;
  --roxo-escuro:#3b0764;
  --bg:#f5f6fa;
  --card:#ffffff;
  --text:#222;
}

.dark{
  --bg:#1e1e2f;
  --card:#2a2a3d;
  --text:#eee;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

/* LOGIN */
#login{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#5b21b6,#9333ea,#3b0764);
}

.box{
  width:320px;
  padding:30px;
  border-radius:15px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  text-align:center;
  color:white;
}

input, select{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:8px;
  border:none;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:var(--roxo-escuro);
  color:white;
  cursor:pointer;
}

/* APP */
#app{display:none}

/* SIDEBAR */
.sidebar{
  width:230px;
  height:100vh;
  position:fixed;
  background:linear-gradient(#5b21b6,#3b0764);
  padding:20px;
  color:white;
}

.sidebar button{
  margin:6px 0;
  background:rgba(255,255,255,0.1);
}

/* MAIN */
.main{
  margin-left:230px;
  padding:25px;
}

/* CARD */
.card{
  background:var(--card);
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
  position:relative;
}

.dark .card{
  background:#2a2a3d;
  color:white;
}

.status{
  padding:4px 10px;
  border-radius:20px;
  font-size:12px;
  color:white;
  cursor:pointer;
}

.ativo{background:#22c55e}
.vencer{background:#eab308;color:black}
.finalizado{background:#6b7280}
.deferido{background:#3b82f6}
.indeferido{background:#ef4444}

/* SMALL BUTTONS */
.actions{
  position:absolute;
  right:10px;
  top:10px;
}

.actions button{
  width:auto;
  padding:5px 8px;
  font-size:11px;
  margin-left:5px;
}

.edit{background:#5b21b6}
.delete{background:#ef4444}

/* ALERTA */
.alerta{
  border-left:5px solid #ef4444;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="box">
    <h2>SIJ PRO</h2>
    <input id="email" placeholder="Email">
    <input id="senha" type="password" placeholder="Senha">
    <button onclick="entrar()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div id="app">

<div class="sidebar">
  <h3>SIJ</h3>
  <button onclick="tela('processos')">Processos</button>
  <button onclick="toggleTema()">🌗 Tema</button>
  <button onclick="sair()">Sair</button>
</div>

<div class="main">

<div id="processos">
<h2>Processos</h2>

<input id="titulo" placeholder="Título">
<input id="parte" placeholder="Parte">

<select id="area">
<option>Cível</option>
<option>Previdenciário</option>
<option>Família</option>
<option>Trabalhista</option>
</select>

<input type="date" id="prazo">

<select id="status">
<option value="ativo">Ativo</option>
<option value="vencer">A vencer</option>
<option value="finalizado">Finalizado</option>
<option value="deferido">Deferido</option>
<option value="indeferido">Indeferido</option>
</select>

<input type="file" id="file">

<button onclick="salvarProcesso()">Salvar</button>

<div id="listaProcessos"></div>
</div>

</div>
</div>

<script>

let editando=null

function entrar(){
  login.style.display="none"
  app.style.display="block"
  renderProcessos()
}

function sair(){
  app.style.display="none"
  login.style.display="flex"
}

function salvarProcesso(){
  let dados = JSON.parse(localStorage.getItem("proc")||"[]")

  let f = file.files[0]
  let url = f ? URL.createObjectURL(f):null

  if(editando){
    let p = dados.find(x=>x.id===editando)
    p.titulo=titulo.value
    p.parte=parte.value
    p.area=area.value
    p.prazo=prazo.value
    p.status=status.value
    if(url) p.file=url
    editando=null
  }else{
    dados.push({
      id:Date.now(),
      titulo:titulo.value,
      parte:parte.value,
      area:area.value,
      prazo:prazo.value,
      status:status.value,
      file:url,
      data:new Date().toLocaleDateString()
    })
  }

  localStorage.setItem("proc",JSON.stringify(dados))
  renderProcessos()
}

function renderProcessos(){
  let dados = JSON.parse(localStorage.getItem("proc")||"[]")
  listaProcessos.innerHTML=""

  let hoje = new Date().toISOString().split("T")[0]

  dados.forEach(p=>{

    let alerta = (p.prazo && p.prazo < hoje) ? "alerta" : ""

    listaProcessos.innerHTML+=`
    <div class="card ${alerta}">

    <div class="actions">
      <button class="edit" onclick="editar(${p.id})">Editar</button>
      <button class="delete" onclick="del(${p.id})">Excluir</button>
    </div>

    <div class="status ${p.status}" onclick="trocarStatus(${p.id})">${p.status}</div>

    <h3>${p.titulo}</h3>
    <p>${p.area}</p>
    <p>${p.parte}</p>
    <p>Prazo: ${p.prazo||"-"}</p>

    ${p.file ? `<a href="${p.file}" target="_blank">📎 Anexo</a>`:""}

    <br><small>${p.data}</small>

    </div>`
  })
}

function trocarStatus(id){
  let dados = JSON.parse(localStorage.getItem("proc"))
  let ordem=["ativo","vencer","finalizado","deferido","indeferido"]

  let p = dados.find(x=>x.id===id)
  let i = ordem.indexOf(p.status)
  p.status = ordem[(i+1)%ordem.length]

  localStorage.setItem("proc",JSON.stringify(dados))
  renderProcessos()
}

function editar(id){
  let dados = JSON.parse(localStorage.getItem("proc"))
  let p = dados.find(x=>x.id===id)

  titulo.value=p.titulo
  parte.value=p.parte
  area.value=p.area
  prazo.value=p.prazo
  status.value=p.status

  editando=id
}

function del(id){
  let d = JSON.parse(localStorage.getItem("proc"))
  d = d.filter(x=>x.id!==id)
  localStorage.setItem("proc",JSON.stringify(d))
  renderProcessos()
}

function toggleTema(){
  document.body.classList.toggle("dark")
}

</script>

</body>
</html>

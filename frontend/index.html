<!DOCTYPE html>
<html>
<head>
  <title>SIJ</title>
</head>
<body>

<h2>Login / Cadastro</h2>

<input id="email" placeholder="Email">
<input id="password" placeholder="Senha" type="password">

<button onclick="login()">Entrar</button>
<button onclick="register()">Cadastrar</button>

<hr>

<h2>Novo Processo</h2>
<input id="titulo" placeholder="Título">
<input id="descricao" placeholder="Descrição">
<button onclick="criar()">Criar</button>

<h2>Processos</h2>
<ul id="lista"></ul>

<script>

const API = "https://sij-backend.onrender.com"

let token = ""

// LOGIN
async function login() {
  const res = await fetch(API + "/login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      email: email.value,
      password: password.value
    })
  })

  const data = await res.json()

  if(data.token){
    token = data.token
    alert("Login feito!")
    listar()
  } else {
    alert(data.error || "Erro no login")
  }
}

// CADASTRO
async function register() {
  const res = await fetch(API + "/register", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      email: email.value,
      password: password.value
    })
  })

  const data = await res.json()

  if(data.ok){
    alert("Conta criada!")
  } else {
    alert("Erro: " + data.error)
  }
}

// CRIAR PROCESSO
async function criar() {
  await fetch(API + "/processos", {
    method: "POST",
    headers: {
      "Content-Type":"application/json",
      "Authorization": token
    },
    body: JSON.stringify({
      titulo: titulo.value,
      descricao: descricao.value
    })
  })

  listar()
}

// LISTAR
async function listar() {
  const res = await fetch(API + "/processos", {
    headers: { "Authorization": token }
  })

  const dados = await res.json()

  lista.innerHTML = ""

  dados.forEach(p => {
    lista.innerHTML += `
      <li>
        ${p.titulo}
        <button onclick="del(${p.id})">Excluir</button>
      </li>
    `
  })
}

// DELETAR
async function del(id) {
  await fetch(API + "/processos/" + id, {
    method: "DELETE",
    headers: { "Authorization": token }
  })

  listar()
}

</script>

</body>
</html>

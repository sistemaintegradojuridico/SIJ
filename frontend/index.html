<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>SIJ PRO</title>

<style>

/* ===== VARIÁVEIS ===== */
:root{
  --roxo:#5b21b6;
  --roxo-escuro:#3b0764;
  --bg:#f4f6fb;
  --card:#ffffff;
  --text:#1f2937;
}

.dark{
  --bg:#0f172a;
  --card:#1e293b;
  --text:#e5e7eb;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

/* LOGIN */
#login{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#5b21b6,#9333ea,#3b0764);
}

.box{
  width:320px;
  padding:30px;
  border-radius:15px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  text-align:center;
  color:white;
}

input,select{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:8px;
  border:none;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:var(--roxo-escuro);
  color:white;
  cursor:pointer;
}

/* APP */
#app{display:none}

/* SIDEBAR */
.sidebar{
  width:230px;
  height:100vh;
  position:fixed;
  background:linear-gradient(#5b21b6,#3b0764);
  padding:20px;
  color:white;
}

.sidebar button{
  margin:6px 0;
  background:rgba(255,255,255,0.1);
}

/* MAIN */
.main{
  margin-left:230px;
  padding:25px;
}

/* CARD */
.card{
  background:var(--card);
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
  position:relative;
}

/* STATUS */
.status{
  padding:4px 10px;
  border-radius:20px;
  font-size:12px;
  color:white;
  cursor:pointer;
}

.ativo{background:#22c55e}
.vencer{background:#eab308;color:black}
.finalizado{background:#6b7280}
.deferido{background:#3b82f6}
.indeferido{background:#ef4444}

/* BOTÕES */
.actions{
  position:absolute;
  right:10px;
  top:10px;
}

.actions button{
  width:auto;
  padding:5px 8px;
  font-size:11px;
  margin-left:5px;
}

.edit{background:#5b21b6}
.delete{background:#ef4444}
.done{background:#22c55e}

/* ALERTA */
.alerta{
  border-left:5px solid red;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="box">
    <h2>SIJ PRO</h2>
    <input placeholder="Email">
    <input type="password" placeholder="Senha">
    <button onclick="entrar()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div id="app">

<div class="sidebar">
  <h3>SIJ</h3>
  <button onclick="tela('dashboard')">Dashboard</button>
  <button onclick="tela('processos')">Processos</button>
  <button onclick="tela('tarefas')">Tarefas</button>
  <button onclick="tela('financeiro')">Financeiro</button>
  <button onclick="tela('escritorio')">Escritórios</button>
  <button onclick="toggleTema()">🌗 Tema</button>
  <button onclick="sair()">Sair</button>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard">
<h2>Dashboard</h2>
<p id="stats"></p>
</div>

<!-- PROCESSOS -->
<div id="processos" style="display:none">
<h2>Processos</h2>

<input id="titulo" placeholder="Título">
<input id="assunto" placeholder="Assunto">
<input id="parte" placeholder="Parte">

<select id="area">
<option>Cível</option>
<option>Previdenciário</option>
<option>Família</option>
<option>Trabalhista</option>
</select>

<input type="date" id="prazo">

<select id="status">
<option value="ativo">Ativo</option>
<option value="vencer">A vencer</option>
<option value="finalizado">Finalizado</option>
<option value="deferido">Deferido</option>
<option value="indeferido">Indeferido</option>
</select>

<input type="file" id="file">

<button onclick="salvarProcesso()">Salvar Processo</button>

<div id="listaProcessos"></div>
</div>

<!-- TAREFAS -->
<div id="tarefas" style="display:none">
<h2>Tarefas da equipe</h2>

<input id="tarefaTexto" placeholder="Nova tarefa">
<button onclick="addTarefa()">Adicionar</button>

<div id="listaTarefas"></div>
</div>

<!-- FINANCEIRO -->
<div id="financeiro" style="display:none">
<h2>Financeiro</h2>

<input id="valor" placeholder="Valor">
<button onclick="addFinanceiro()">Adicionar</button>

<div id="listaFinanceiro"></div>
</div>

<!-- ESCRITÓRIO -->
<div id="escritorio" style="display:none">
<h2>Escritório</h2>

<input id="funcionario" placeholder="Nome funcionário">
<button onclick="addFuncionario()">Adicionar funcionário (+R$10)</button>

<div id="listaFuncionarios"></div>

<p id="mensalidade"></p>
</div>

</div>
</div>

<script>

/* LOGIN */
function entrar(){
  login.style.display="none"
  app.style.display="block"
  renderAll()
}

function sair(){
  app.style.display="none"
  login.style.display="flex"
}

/* TELAS */
function tela(x){
  dashboard.style.display="none"
  processos.style.display="none"
  tarefas.style.display="none"
  financeiro.style.display="none"
  escritorio.style.display="none"

  document.getElementById(x).style.display="block"
}

/* PROCESSOS */
function salvarProcesso(){
  let d = JSON.parse(localStorage.getItem("proc")||"[]")

  d.push({
    id:Date.now(),
    titulo:titulo.value,
    assunto:assunto.value,
    parte:parte.value,
    area:area.value,
    prazo:prazo.value,
    status:status.value,
    data:new Date().toLocaleDateString()
  })

  localStorage.setItem("proc",JSON.stringify(d))
  renderProcessos()
}

function renderProcessos(){
  let d = JSON.parse(localStorage.getItem("proc")||"[]")
  listaProcessos.innerHTML=""

  let hoje = new Date().toISOString().split("T")[0]

  d.forEach(p=>{
    let alerta = (p.prazo && p.prazo < hoje) ? "alerta" : ""

    listaProcessos.innerHTML+=`
    <div class="card ${alerta}">

    <div class="actions">
      <button class="delete" onclick="delProc(${p.id})">Excluir</button>
    </div>

    <div class="status ${p.status}" onclick="trocarStatus(${p.id})">${p.status}</div>

    <h3>${p.titulo}</h3>
    <p>${p.assunto}</p>
    <p>${p.area}</p>
    <p>${p.parte}</p>
    <p>Prazo: ${p.prazo||"-"}</p>
    <small>${p.data}</small>

    </div>`
  })
}

function trocarStatus(id){
  let d = JSON.parse(localStorage.getItem("proc"))
  let ordem=["ativo","vencer","finalizado","deferido","indeferido"]

  let p = d.find(x=>x.id===id)
  let i = ordem.indexOf(p.status)
  p.status = ordem[(i+1)%ordem.length]

  localStorage.setItem("proc",JSON.stringify(d))
  renderProcessos()
}

function delProc(id){
  let d = JSON.parse(localStorage.getItem("proc"))
  d = d.filter(x=>x.id!==id)
  localStorage.setItem("proc",JSON.stringify(d))
  renderProcessos()
}

/* TAREFAS */
function addTarefa(){
  let t = JSON.parse(localStorage.getItem("tarefas")||"[]")
  t.push({txt:tarefaTexto.value})
  localStorage.setItem("tarefas",JSON.stringify(t))
  renderTarefas()
}

function renderTarefas(){
  let t = JSON.parse(localStorage.getItem("tarefas")||"[]")
  listaTarefas.innerHTML=""

  t.forEach((x,i)=>{
    listaTarefas.innerHTML+=`
    <div class="card">
      ${x.txt}
      <button class="done" onclick="done(${i})">OK</button>
    </div>`
  })
}

function done(i){
  let t = JSON.parse(localStorage.getItem("tarefas"))
  t.splice(i,1)
  localStorage.setItem("tarefas",JSON.stringify(t))
  renderTarefas()
}

/* FINANCEIRO */
function addFinanceiro(){
  let f = JSON.parse(localStorage.getItem("fin")||"[]")
  f.push(valor.value)
  localStorage.setItem("fin",JSON.stringify(f))
  renderFinanceiro()
}

function renderFinanceiro(){
  let f = JSON.parse(localStorage.getItem("fin")||"[]")
  listaFinanceiro.innerHTML=""

  let total=0

  f.forEach(v=>{
    total+=Number(v)
    listaFinanceiro.innerHTML+=`<div class="card">R$ ${v}</div>`
  })

  listaFinanceiro.innerHTML+=`<h3>Total: R$ ${total}</h3>`
}

/* FUNCIONÁRIOS */
function addFuncionario(){
  let f = JSON.parse(localStorage.getItem("func")||"[]")
  f.push(funcionario.value)
  localStorage.setItem("func",JSON.stringify(f))
  renderFunc()
}

function renderFunc(){
  let f = JSON.parse(localStorage.getItem("func")||"[]")
  listaFuncionarios.innerHTML=""

  f.forEach(x=>{
    listaFuncionarios.innerHTML+=`<div class="card">${x}</div>`
  })

  let mensal = 39 + (f.length*10)
  mensalidade.innerHTML = "Mensalidade: R$ "+mensal
}

/* DASHBOARD */
function renderDashboard(){
  let d = JSON.parse(localStorage.getItem("proc")||"[]")

  let def = d.filter(x=>x.status==="deferido").length
  let ind = d.filter(x=>x.status==="indeferido").length

  stats.innerHTML = `Deferidos: ${def} | Indeferidos: ${ind}`
}

/* GERAL */
function renderAll(){
  renderProcessos()
  renderTarefas()
  renderFinanceiro()
  renderFunc()
  renderDashboard()
}

function toggleTema(){
  document.body.classList.toggle("dark")
}

</script>

</body>
</html>

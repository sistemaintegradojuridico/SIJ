<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>SIJ PRO</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#4b004f,#7a003c,#2b0033);
  color:white;
}

/* LOGIN */
.center{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  flex-direction:column;
}

.box{
  background:rgba(255,255,255,0.1);
  padding:30px;
  border-radius:15px;
  width:300px;
  text-align:center;
  backdrop-filter:blur(10px);
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-radius:8px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:linear-gradient(90deg,#ff416c,#ff4b2b);
  color:white;
  cursor:pointer;
}

.link{
  margin-top:10px;
  cursor:pointer;
}

/* SISTEMA */
.app{
  display:none;
}

.sidebar{
  width:220px;
  height:100vh;
  background:#1a001f;
  position:fixed;
  padding:20px;
}

.sidebar h2{
  margin-bottom:30px;
}

.menu{
  cursor:pointer;
  margin:10px 0;
}

.content{
  margin-left:240px;
  padding:20px;
}

/* CARDS */
.card{
  background:rgba(255,255,255,0.1);
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;
}

.hidden{
  display:none;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="center">
  <h1>SIJ PRO</h1>
  <div class="box">
    <input id="email" placeholder="Email">
    <input id="senha" type="password" placeholder="Senha">
    <button onclick="login()">Entrar</button>
    <div class="link" onclick="register()">Criar conta</div>
  </div>
</div>

<!-- APP -->
<div id="app" class="app">

  <div class="sidebar">
    <h2>SIJ</h2>
    <div class="menu" onclick="mostrar('dashboard')">Dashboard</div>
    <div class="menu" onclick="mostrar('processos')">Processos</div>
    <div class="menu" onclick="mostrar('ia')">IA Petição</div>
    <div class="menu" onclick="logout()">Sair</div>
  </div>

  <div class="content">

    <!-- DASHBOARD -->
    <div id="dashboard">
      <h1>Dashboard</h1>
      <div class="card">Bem vindo ao sistema 👊</div>
    </div>

    <!-- PROCESSOS -->
    <div id="processos" class="hidden">
      <h1>Processos</h1>

      <div class="card">
        <input id="titulo" placeholder="Título">
        <input id="descricao" placeholder="Descrição">
        <button onclick="criar()">Salvar</button>
      </div>

      <div id="lista"></div>
    </div>

    <!-- IA -->
    <div id="ia" class="hidden">
      <h1>Gerar Petição IA</h1>

      <div class="card">
        <input id="tema" placeholder="Tema da petição">
        <button onclick="gerarIA()">Gerar</button>
      </div>

      <div class="card" id="resIA"></div>
    </div>

  </div>

</div>

<script>

const API = "https://sij-backend.onrender.com"

let token = null

function mostrar(tela){
  document.getElementById("dashboard").classList.add("hidden")
  document.getElementById("processos").classList.add("hidden")
  document.getElementById("ia").classList.add("hidden")

  document.getElementById(tela).classList.remove("hidden")
}

async function register(){
  const email = document.getElementById("email").value
  const password = document.getElementById("senha").value

  await fetch(API+"/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email,password})
  })

  alert("Conta criada!")
}

async function login(){
  const email = document.getElementById("email").value
  const password = document.getElementById("senha").value

  const res = await fetch(API+"/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email,password})
  })

  const data = await res.json()

  if(res.ok){
    token = data.token

    document.getElementById("loginScreen").style.display="none"
    document.getElementById("app").style.display="block"

    listar()
  }else{
    alert(data.error)
  }
}

function logout(){
  location.reload()
}

async function criar(){
  const titulo = document.getElementById("titulo").value
  const descricao = document.getElementById("descricao").value

  await fetch(API+"/processos",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":token
    },
    body:JSON.stringify({titulo,descricao})
  })

  listar()
}

async function listar(){
  const res = await fetch(API+"/processos",{
    headers:{Authorization:token}
  })

  const data = await res.json()

  const lista = document.getElementById("lista")
  lista.innerHTML=""

  data.forEach(p=>{
    lista.innerHTML+=`
      <div class="card">
        <b>${p.titulo}</b><br>
        ${p.descricao}<br>
        <button onclick="excluir(${p.id})">Excluir</button>
      </div>
    `
  })
}

async function excluir(id){
  await fetch(API+"/processos/"+id,{
    method:"DELETE",
    headers:{Authorization:token}
  })

  listar()
}

async function gerarIA(){
  const tema = document.getElementById("tema").value

  const res = await fetch(API+"/ia",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":token
    },
    body:JSON.stringify({tema})
  })

  const data = await res.json()

  document.getElementById("resIA").innerText = data.texto
}

</script>

</body>
</html>

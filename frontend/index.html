<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>SIJ PRO</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: linear-gradient(135deg,#2b0a2e,#5a0f3d,#7b1e4f);
  color:white;
  text-align:center;
}

.container{
  width:300px;
  margin:40px auto;
}

input, select, button{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:8px;
}

button{
  background:linear-gradient(90deg,#ff416c,#ff4b2b);
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.card{
  background:white;
  color:black;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
}
</style>

</head>

<body>

<div class="container">

<button onclick="logout()">Sair</button>

<input id="titulo" placeholder="Título">

<select id="area">
  <option>Cível</option>
  <option>Previdenciário</option>
  <option>Família</option>
  <option>Trabalhista</option>
  <option>Penal</option>
</select>

<input id="parte" placeholder="Nome da parte">

<input id="descricao" placeholder="Descrição">

<input id="prazo" type="date">

<input id="arquivo" type="file">

<button onclick="salvar()">Salvar</button>

<h3>Prazos próximos</h3>
<div id="alertas"></div>

<h3>Processos</h3>
<div id="lista"></div>

</div>

<script>

const API = "https://sij-backend.onrender.com"
let token = localStorage.getItem("token")
let editandoId = null

function logout(){
  localStorage.removeItem("token")
  location.reload()
}

function hoje(){
  return new Date().toISOString().split("T")[0]
}

async function salvar(){

  const dados = {
    titulo: titulo.value,
    area: area.value,
    parte: parte.value,
    descricao: descricao.value,
    prazo: prazo.value,
    dataCriacao: hoje(),
    arquivo: arquivo.files[0]?.name || null
  }

  if(editandoId){
    await fetch(API + "/processos/" + editandoId,{
      method:"PUT",
      headers:{
        "Content-Type":"application/json",
        "Authorization":token
      },
      body: JSON.stringify(dados)
    })
    editandoId = null
  }else{
    await fetch(API + "/processos",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":token
      },
      body: JSON.stringify(dados)
    })
  }

  limpar()
  listar()
}

function limpar(){
  titulo.value=""
  parte.value=""
  descricao.value=""
  prazo.value=""
}

async function listar(){

  const res = await fetch(API + "/processos",{
    headers:{ "Authorization":token }
  })

  const dados = await res.json()

  lista.innerHTML=""
  alertas.innerHTML=""

  const hojeData = new Date()

  dados.forEach(p=>{

    lista.innerHTML += `
      <div class="card">
        <b>${p.titulo}</b><br>
        Área: ${p.area}<br>
        Parte: ${p.parte}<br>
        Criado em: ${p.dataCriacao}<br>
        Prazo: ${p.prazo || "sem prazo"}<br>
        Arquivo: ${p.arquivo || "nenhum"}<br><br>

        <button onclick="editar('${p.id}')">Editar</button>
        <button onclick="deletar('${p.id}')">Excluir</button>
      </div>
    `

    if(p.prazo){
      const dataPrazo = new Date(p.prazo)
      const diff = (dataPrazo - hojeData) / (1000*60*60*24)

      if(diff <= 3){
        alertas.innerHTML += `
          <div class="card">
            ⚠️ ${p.titulo} vence em ${Math.ceil(diff)} dia(s)
          </div>
        `
      }
    }

  })
}

function editar(id){

  fetch(API + "/processos",{
    headers:{ "Authorization":token }
  })
  .then(r=>r.json())
  .then(dados=>{
    const p = dados.find(x=>x.id == id)

    titulo.value = p.titulo
    area.value = p.area
    parte.value = p.parte
    descricao.value = p.descricao
    prazo.value = p.prazo

    editandoId = id
  })
}

async function deletar(id){
  await fetch(API + "/processos/"+id,{
    method:"DELETE",
    headers:{ "Authorization":token }
  })
  listar()
}

listar()

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>SIJ PRO</title>

<style>
body {
  margin:0;
  font-family: Arial;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;

  background: linear-gradient(135deg, #2a003f, #5a0f3d, #8b1e3f);
}

/* textura */
body::after{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background-image: radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size: 4px 4px;
}

/* logo */
.logo{
  text-align:center;
  margin-bottom:20px;
}

.logo img{
  width:100px;
  margin-bottom:10px;
}

.logo h1{
  color:#f7d774;
  font-size:18px;
  letter-spacing:2px;
}

/* caixa */
.container{
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.08);
  padding:30px;
  border-radius:20px;
  width:280px;
  text-align:center;
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
}

/* inputs */
input{
  width:100%;
  margin:8px 0;
  padding:10px;
  border-radius:8px;
  border:none;
}

/* botão */
.btn{
  width:100%;
  margin-top:15px;
  padding:12px;

  background: linear-gradient(90deg, #ff512f, #dd2476);
  border:none;
  border-radius:10px;

  color:white;
  font-weight:bold;
  font-size:16px;

  cursor:pointer;

  display:flex;
  align-items:center;
  justify-content:center;

  transition:0.3s;
}

.btn:hover{
  transform: scale(1.05);
}

/* link */
.link{
  margin-top:10px;
  color:white;
  cursor:pointer;
  font-size:14px;
}

/* app */
#appBox{
  display:none;
  color:white;
  text-align:center;
}

.processo{
  background: rgba(255,255,255,0.1);
  margin:10px;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<div>
  <!-- LOGO -->
  <div class="logo">
    <img src="logo.png">
    <h1>SISTEMA INTEGRADO JURÍDICO</h1>
  </div>

  <!-- LOGIN -->
  <div class="container" id="loginBox">
    <input id="email" placeholder="Email">
    <input id="senha" type="password" placeholder="Senha">

    <button class="btn" onclick="login()">Entrar</button>

    <div class="link" onclick="mostrarCadastro()">Criar conta</div>
  </div>

  <!-- CADASTRO -->
  <div class="container" id="cadastroBox" style="display:none;">
    <input id="novoEmail" placeholder="Email">
    <input id="novaSenha" type="password" placeholder="Senha">

    <button class="btn" onclick="register()">Cadastrar</button>

    <div class="link" onclick="voltarLogin()">Voltar</div>
  </div>

  <!-- APP -->
  <div id="appBox">
    <h2>Processos</h2>

    <input id="titulo" placeholder="Título">
    <input id="descricao" placeholder="Descrição">
    <button class="btn" onclick="criar()">Salvar</button>

    <div id="lista"></div>
  </div>
</div>

<script>
const API = "https://sij-backend.onrender.com"

let token = null

function mostrarCadastro(){
  document.getElementById("loginBox").style.display="none"
  document.getElementById("cadastroBox").style.display="block"
}

function voltarLogin(){
  document.getElementById("cadastroBox").style.display="none"
  document.getElementById("loginBox").style.display="block"
}

// ================= REGISTER =================
async function register(){
  const email = document.getElementById("novoEmail").value
  const password = document.getElementById("novaSenha").value

  const res = await fetch(API + "/register", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ email, password })
  })

  if(res.ok){
    alert("Conta criada!")
    voltarLogin()
  } else {
    alert("Erro ao cadastrar")
  }
}

// ================= LOGIN =================
async function login(){
  const email = document.getElementById("email").value
  const password = document.getElementById("senha").value

  const res = await fetch(API + "/login", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ email, password })
  })

  const data = await res.json()

  if(res.ok){
    alert("Login feito 🚀")

    token = data.token

    document.getElementById("loginBox").style.display="none"
    document.getElementById("appBox").style.display="block"

    listar()
  } else {
    alert(data.error)
  }
}

// ================= CRIAR =================
async function criar(){
  const titulo = document.getElementById("titulo").value
  const descricao = document.getElementById("descricao").value

  await fetch(API + "/processos", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization": token
    },
    body: JSON.stringify({ titulo, descricao })
  })

  listar()
}

// ================= LISTAR =================
async function listar(){
  const res = await fetch(API + "/processos", {
    headers:{ "Authorization": token }
  })

  const data = await res.json()

  const lista = document.getElementById("lista")
  lista.innerHTML=""

  data.forEach(p=>{
    lista.innerHTML += `
      <div class="processo">
        <b>${p.titulo}</b><br>
        ${p.descricao}<br>
        <button onclick="deletar(${p.id})">X</button>
      </div>
    `
  })
}

// ================= DELETE =================
async function deletar(id){
  await fetch(API + "/processos/" + id, {
    method:"DELETE",
    headers:{ "Authorization": token }
  })

  listar()
}
</script>

</body>
</html>

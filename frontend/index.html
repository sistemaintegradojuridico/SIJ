<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>SIJ</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #3b0a1a, #6e0f2c, #2a0012);
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

/* LOGO / NOME */
.logo {
    color: white;
    font-size: 32px;
    font-weight: bold;
    margin-bottom: 25px;
    letter-spacing: 2px;
}

/* CARD */
.container {
    background: white;
    padding: 30px;
    border-radius: 12px;
    width: 300px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    text-align: center;
}

/* INPUTS */
input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
}

/* BOTÕES */
button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border: none;
    border-radius: 6px;
    background: linear-gradient(135deg, #7a0f2c, #b3123f);
    color: white;
    font-weight: bold;
    cursor: pointer;
}

/* LINK */
.link {
    margin-top: 10px;
    font-size: 13px;
    color: #7a0f2c;
    cursor: pointer;
}

/* ÁREA SISTEMA */
#app {
    display: none;
    margin-top: 20px;
}

</style>
</head>

<body>

<div class="logo">⚖️ SIJ</div>

<div class="container" id="loginBox">
    <h3>Login</h3>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Senha">
    <button onclick="login()">Entrar</button>
    <div class="link" onclick="register()">Criar conta</div>
</div>

<div class="container" id="app">
    <h3>Criar Processo</h3>
    <input id="titulo" placeholder="Título">
    <input id="descricao" placeholder="Descrição">
    <button onclick="criar()">Salvar</button>

    <h3>Processos</h3>
    <ul id="lista"></ul>
</div>

<script>
const API = "https://sij-backend.onrender.com"
let token = ""

// LOGIN
async function login() {
    const res = await fetch(API + "/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            email: document.getElementById("email").value,
            password: document.getElementById("password").value
        })
    })

    const data = await res.json()

    if(data.token){
        token = data.token
        document.getElementById("loginBox").style.display = "none"
        document.getElementById("app").style.display = "block"
        listar()
    } else {
        alert(data.error || "Erro no login")
    }
}

// CADASTRO
async function register() {
    const email = document.getElementById("email").value
    const password = document.getElementById("password").value

    if(!email || !password){
        alert("Preencha email e senha")
        return
    }

    const res = await fetch(API + "/register", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({email, password})
    })

    const data = await res.json()

    if(data.ok){
        alert("Conta criada!")
    } else {
        alert(data.error)
    }
}

// CRIAR PROCESSO
async function criar(){
    const res = await fetch(API + "/processos", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": token
        },
        body: JSON.stringify({
            titulo: document.getElementById("titulo").value,
            descricao: document.getElementById("descricao").value
        })
    })

    const data = await res.json()

    if(data.ok){
        listar()
    } else {
        alert(data.error)
    }
}

// LISTAR
async function listar(){
    const res = await fetch(API + "/processos", {
        headers: {"Authorization": token}
    })

    const data = await res.json()

    const lista = document.getElementById("lista")
    lista.innerHTML = ""

    data.forEach(p => {
        const li = document.createElement("li")
        li.innerText = p.titulo + " - " + p.descricao
        lista.appendChild(li)
    })
}
</script>

</body>
</html>

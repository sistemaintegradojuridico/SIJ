<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>SIJ</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at top, #5a0f1c, #1a0004);
}

/* CARD */
.container {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(12px);
  padding: 25px;
  border-radius: 12px;
  width: 330px;
  color: white;
  box-shadow: 0 0 30px rgba(0,0,0,0.6);
}

h1 {
  text-align: center;
}

input {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border: none;
  border-radius: 6px;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.btn {
  background: linear-gradient(135deg, #8b1e2d, #3a0911);
  color: white;
}

.section {
  margin-top: 15px;
  border-top: 1px solid rgba(255,255,255,0.2);
  padding-top: 10px;
}

#processos div {
  background: rgba(255,255,255,0.1);
  padding: 8px;
  margin-top: 5px;
  border-radius: 6px;
}
</style>
</head>

<body>

<div class="container">
  <h1>⚖️ SIJ</h1>

  <h3>Login</h3>
  <input id="email" placeholder="Email">
  <input id="senha" type="password" placeholder="Senha">
  <button class="btn" onclick="login()">Entrar</button>

  <div class="section">
    <h3>Cadastrar</h3>
    <input id="email2" placeholder="Email">
    <input id="senha2" type="password" placeholder="Senha">
    <button class="btn" onclick="register()">Criar conta</button>
  </div>

  <div class="section">
    <h3>Processos</h3>
    <input id="titulo" placeholder="Título">
    <input id="descricao" placeholder="Descrição">
    <button class="btn" onclick="criar()">Salvar</button>

    <div id="processos"></div>
  </div>
</div>

<script>
const API = ""

async function login() {
  const email = document.getElementById("email").value
  const password = document.getElementById("senha").value

  const res = await fetch("/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password })
  })

  const data = await res.json()

  if (data.token) {
    alert("Login OK")
    listar()
  } else {
    alert(data.error)
  }
}

async function register() {
  const email = document.getElementById("email2").value
  const password = document.getElementById("senha2").value

  const res = await fetch("/register", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password })
  })

  const data = await res.json()

  if (data.ok) {
    alert("Conta criada")
  } else {
    alert(data.error)
  }
}

async function criar() {
  const titulo = document.getElementById("titulo").value
  const descricao = document.getElementById("descricao").value

  const res = await fetch("/processos", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ titulo, descricao })
  })

  const data = await res.json()

  if (data.ok) {
    listar()
  } else {
    alert(data.error)
  }
}

async function listar() {
  const res = await fetch("/processos")
  const dados = await res.json()

  const div = document.getElementById("processos")
  div.innerHTML = ""

  dados.forEach(p => {
    div.innerHTML += `<div><b>${p.titulo}</b><br>${p.descricao}</div>`
  })
}
</script>

</body>
</html>

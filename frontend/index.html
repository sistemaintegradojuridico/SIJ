<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>SIJ PRO</title>

<style>
body{
  margin:0;
  font-family:Arial;
}

/* FUNDO LOGIN */
#login{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#5a0f3b,#7b1e57,#3d0c2e);
}

/* CARD LOGIN */
.login-box{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);
  padding:30px;
  border-radius:15px;
  width:300px;
  text-align:center;
  color:white;
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:8px;
  border:none;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#ff4b2b;
  color:white;
  cursor:pointer;
}

/* LINKS */
.links{
  margin-top:10px;
  font-size:13px;
}

.links span{
  cursor:pointer;
  display:block;
}

/* APP */
#app{
  display:none;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  height:100vh;
  background:#5a0f3b;
  color:white;
  padding:20px;
  position:fixed;
}

.sidebar h2{
  text-align:center;
}

.sidebar button{
  width:100%;
  margin:8px 0;
  background:rgba(255,255,255,0.1);
}

/* MAIN */
.main{
  margin-left:220px;
  padding:20px;
  background:#f4f6f9;
  min-height:100vh;
}

/* CARD PROCESSO */
.card{
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

/* STATUS */
.status{
  padding:5px 10px;
  border-radius:20px;
  font-size:12px;
  color:white;
}

.ativo{background:#28a745;}
.vencer{background:#ffc107;color:black;}
.finalizado{background:#6c757d;}
.deferido{background:#007bff;}
.indeferido{background:#dc3545;}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <h2>SIJ PRO</h2>

    <input id="email" placeholder="Email">
    <input id="senha" type="password" placeholder="Senha">

    <button onclick="entrar()">Entrar</button>

    <div class="links">
      <span onclick="alert('Cadastro em breve')">Criar conta</span>
      <span onclick="alert('Senha enviada para email (simulado)')">Esqueci minha senha</span>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">

<div class="sidebar">
  <h2>SIJ</h2>

  <button onclick="mostrar('lista')">Processos</button>
  <button onclick="mostrar('novo')">Novo Processo</button>
  <button onclick="sair()">Sair</button>
</div>

<div class="main">

<h2>Processos</h2>

<!-- FORM -->
<div id="novo" style="display:none;">
<input id="titulo" placeholder="Título">
<select id="area">
<option>Cível</option>
<option>Previdenciário</option>
<option>Família</option>
<option>Trabalhista</option>
</select>
<input id="parte" placeholder="Parte">
<input id="prazo" type="date">
<button onclick="salvar()">Salvar</button>
</div>

<!-- LISTA -->
<div id="lista"></div>

</div>
</div>

<script>

let editando=null

function entrar(){
  if(email.value && senha.value){
    login.style.display="none"
    app.style.display="block"
    listar()
  }
}

function sair(){
  app.style.display="none"
  login.style.display="flex"
}

function mostrar(t){
  novo.style.display="none"

  if(t==="novo"){
    novo.style.display="block"
  }
}

function salvar(){
  let dados = JSON.parse(localStorage.getItem("dados")||"[]")

  if(editando){
    let p = dados.find(x=>x.id===editando)
    p.titulo=titulo.value
    p.area=area.value
    p.parte=parte.value
    p.prazo=prazo.value
  }else{
    dados.push({
      id:Date.now(),
      titulo:titulo.value,
      area:area.value,
      parte:parte.value,
      prazo:prazo.value,
      status:"ativo",
      data:new Date().toLocaleDateString()
    })
  }

  localStorage.setItem("dados",JSON.stringify(dados))
  listar()
  novo.style.display="none"
}

function listar(){
  let dados = JSON.parse(localStorage.getItem("dados")||"[]")
  lista.innerHTML=""

  dados.forEach(p=>{
    lista.innerHTML+=`
    <div class="card">
      <span class="status ${p.status}">${p.status}</span><br>
      <b>${p.titulo}</b><br>
      ${p.area} - ${p.parte}<br>
      Prazo: ${p.prazo || "—"}<br>
      <small>Criado: ${p.data}</small>

      <br><br>

      <button onclick="editar(${p.id})">Editar</button>
      <button onclick="excluir(${p.id})">Excluir</button>
    </div>`
  })
}

function editar(id){
  let dados = JSON.parse(localStorage.getItem("dados"))
  let p = dados.find(x=>x.id===id)

  titulo.value=p.titulo
  area.value=p.area
  parte.value=p.parte
  prazo.value=p.prazo

  editando=id
  mostrar("novo")
}

function excluir(id){
  let dados = JSON.parse(localStorage.getItem("dados"))
  dados = dados.filter(p=>p.id!==id)
  localStorage.setItem("dados",JSON.stringify(dados))
  listar()
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>SIJ</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #1e3a8a, #6d28d9);
  height: 100vh;
  margin: 0;
  display: flex;
  justify-content: center;
  align-items: center;
}

.container {
  background: white;
  padding: 30px;
  border-radius: 12px;
  width: 320px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

h1 {
  color: white;
  position: absolute;
  top: 40px;
  text-align: center;
  width: 100%;
}

input {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  background: linear-gradient(90deg, #1e3a8a, #6d28d9);
  color: white;
  border: none;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<h1>⚖️ SIJ</h1>

<div class="container">

<h3>Login</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>

<hr>

<h3>Cadastrar</h3>
<button onclick="register()">Criar conta</button>

<hr>

<div id="area" class="hidden">
  <h3>Novo Processo</h3>
  <input id="titulo" placeholder="Título">
  <input id="descricao" placeholder="Descrição">
  <button onclick="criar()">Salvar</button>

  <h3>Lista</h3>
  <ul id="lista"></ul>

  <button onclick="logout()">Sair</button>
</div>

</div>

<script>
const API = "https://sij-backend.onrender.com"

let token = null

// LOGIN
async function login(){

  const email = document.getElementById("email").value
  const password = document.getElementById("password").value

  if(!email || !password){
    alert("Preencha tudo!")
    return
  }

  const res = await fetch(API + "/login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ email, password })
  })

  const data = await res.json()

  if(data.token){
    token = data.token
    alert("Login feito!")
    document.getElementById("area").classList.remove("hidden")
    listar()
  } else {
    alert(data.error || "Erro no login")
  }
}

// CADASTRO
async function register(){

  const email = document.getElementById("email").value
  const password = document.getElementById("password").value

  if(!email || !password){
    alert("Preencha email e senha!")
    return
  }

  if(password.length < 4){
    alert("Senha muito curta!")
    return
  }

  const res = await fetch(API + "/register", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ email, password })
  })

  const data = await res.json()

  if(data.ok){
    alert("Conta criada!")
  } else {
    alert("Erro: " + data.error)
  }
}

// CRIAR PROCESSO
async function criar(){

  const titulo = document.getElementById("titulo").value
  const descricao = document.getElementById("descricao").value

  if(!titulo){
    alert("Digite um título!")
    return
  }

  const res = await fetch(API + "/processos", {
    method: "POST",
    headers: {
      "Content-Type":"application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify({ titulo, descricao })
  })

  const data = await res.json()

  if(data.ok){
    alert("Salvo!")
    listar()
  } else {
    alert("Erro ao salvar")
  }
}

// LISTAR
async function listar(){

  const res = await fetch(API + "/processos", {
    headers: {
      "Authorization": "Bearer " + token
    }
  })

  const data = await res.json()

  const lista = document.getElementById("lista")
  lista.innerHTML = ""

  data.forEach(p => {
    const li = document.createElement("li")
    li.innerText = p.titulo + " - " + p.descricao
    lista.appendChild(li)
  })
}

// LOGOUT
function logout(){
  token = null
  document.getElementById("area").classList.add("hidden")
  alert("Saiu!")
}
</script>

</body>
</html>

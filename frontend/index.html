<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>SIJ</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;

  /* FUNDO ROXO VINHO COM TEXTURA */
  background: radial-gradient(circle at top, #7a1f3d, #2a0015);
  font-family: Arial;
}

/* TEXTURA */
body::after{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background-image:url("https://www.transparenttextures.com/patterns/asfalt-dark.png");
  opacity:0.25;
  pointer-events:none;
}

/* LOGO */
.logo{
  text-align:center;
  margin-bottom:20px;
}

.logo img{
  width:90px;
  border-radius:50%;
  box-shadow:0 0 20px rgba(255,255,255,0.3);
}

.logo h1{
  color:#f5d58c;
  font-size:18px;
  letter-spacing:2px;
  margin-top:10px;
}

/* CAIXA */
.container{
  background: rgba(255,255,255,0.08);
  padding:25px;
  border-radius:12px;
  backdrop-filter: blur(10px);
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
  width:260px;
}

/* INPUTS */
input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:6px;
  outline:none;
}

/* BOTÃO */
button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:6px;
  background: linear-gradient(90deg,#ff416c,#ff4b2b);
  color:white;
  cursor:pointer;
  margin-top:10px;
}

/* LINK */
.link{
  text-align:center;
  margin-top:10px;
  color:#eee;
  cursor:pointer;
  font-size:13px;
}

</style>
</head>

<body>

<div class="logo">
  <img src="logo.png">
  <h1>SISTEMA INTEGRADO JURÍDICO</h1>
</div>

<div class="container">
  <input placeholder="Email">
  <input type="password" placeholder="Senha">
  <button>Entrar</button>
  <div class="link">Criar conta</div>
</div>

</body>
</html>

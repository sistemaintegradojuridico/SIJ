<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>SIJ PRO</title>

<style>
body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;

  /* FUNDO VINHO + TEXTURA */
  background:
    radial-gradient(circle at 20% 30%, rgba(255,255,255,0.05), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(255,255,255,0.04), transparent 40%),
    linear-gradient(135deg,#2b001a,#5a002b,#2b001a);
}

/* LOGO */
.logo{
  text-align:center;
  margin-bottom:20px;
}

.logo img{
  width:120px;
  margin-bottom:10px;
}

.logo h1{
  color:#d4af37;
  font-weight:300;
  letter-spacing:2px;
}

/* CAIXA */
.container{
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  padding:30px;
  border-radius:16px;
  width:320px;
  box-shadow:0 20px 50px rgba(0,0,0,0.5);
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border:none;
  border-radius:8px;
  background:rgba(255,255,255,0.15);
  color:#fff;
}

input::placeholder{
  color:#ddd;
}

/* BOTÃO */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:linear-gradient(90deg,#7a002f,#b3003c);
  color:#fff;
  font-weight:bold;
  cursor:pointer;
  margin-bottom:10px;
}

button:hover{
  opacity:0.9;
}

/* LINKS */
.link{
  text-align:center;
  color:#d4af37;
  cursor:pointer;
  font-size:14px;
}

/* ESCONDER */
.hidden{
  display:none;
}

#appBox{
  margin-top:20px;
}
</style>
</head>

<body>

<!-- LOGO -->
<div class="logo">
  <!-- coloca tua imagem aqui -->
  <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
  <h1>SISTEMA INTEGRADO JURÍDICO</h1>
</div>

<!-- CAIXA -->
<div class="container">

  <!-- LOGIN -->
  <div id="loginBox">
    <input id="email" placeholder="Email">
    <input id="senha" type="password" placeholder="Senha">
    <button onclick="login()">Entrar</button>
    <div class="link" onclick="mostrarCadastro()">Criar conta</div>
  </div>

  <!-- CADASTRO -->
  <div id="cadastroBox" class="hidden">
    <input id="novoEmail" placeholder="Email">
    <input id="novaSenha" type="password" placeholder="Senha">
    <button onclick="register()">Cadastrar</button>
    <div class="link" onclick="voltarLogin()">Voltar</div>
  </div>

  <!-- APP -->
  <div id="appBox" class="hidden">
    <input id="titulo" placeholder="Título">
    <input id="descricao" placeholder="Descrição">
    <button onclick="criar()">Salvar</button>

    <input id="tema" placeholder="Tema da petição">
    <button onclick="gerarIA()">Gerar Petição IA</button>

    <div id="lista"></div>
  </div>

</div>

<script>
const API = "https://sij-backend.onrender.com"
let token = null

function mostrarCadastro(){
  loginBox.classList.add("hidden")
  cadastroBox.classList.remove("hidden")
}

function voltarLogin(){
  cadastroBox.classList.add("hidden")
  loginBox.classList.remove("hidden")
}

async function register(){
  const email = novoEmail.value
  const password = novaSenha.value

  await fetch(API+"/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email,password})
  })

  alert("Conta criada!")
  voltarLogin()
}

async function login(){
  const email = document.getElementById("email").value
  const password = document.getElementById("senha").value

  const res = await fetch(API+"/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email,password})
  })

  const data = await res.json()

  if(res.ok){
    token = data.token
    loginBox.classList.add("hidden")
    appBox.classList.remove("hidden")
    listar()
  }else{
    alert(data.error)
  }
}

async function criar(){
  await fetch(API+"/processos",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":token
    },
    body:JSON.stringify({
      titulo:titulo.value,
      descricao:descricao.value
    })
  })
  listar()
}

async function listar(){
  const res = await fetch(API+"/processos",{
    headers:{Authorization:token}
  })

  const data = await res.json()

  lista.innerHTML = data.map(p=>
    `<div>${p.titulo} - ${p.descricao}
    <button onclick="deletar(${p.id})">X</button></div>`
  ).join("")
}

async function deletar(id){
  await fetch(API+"/processos/"+id,{
    method:"DELETE",
    headers:{Authorization:token}
  })
  listar()
}

async function gerarIA(){
  const tema = document.getElementById("tema").value

  const res = await fetch(API+"/ia/peticao",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":token
    },
    body:JSON.stringify({tema})
  })

  const data = await res.json()

  alert(data.texto || "IA não disponível ainda")
}
</script>

</body>
</html>
